<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BannerAI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a12;color:#f0f0fa;font-family:'Noto Sans JP',sans-serif;display:flex;min-height:100vh;}
.sb{width:340px;min-width:340px;background:#10101a;border-right:1px solid #1e1e38;padding:16px;overflow-y:auto;height:100vh;position:sticky;top:0;}
.logo{font-size:18px;font-weight:900;background:linear-gradient(130deg,#ff6eb4,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px;}
.tag{font-size:10px;color:#6060a0;margin-bottom:14px;}
.sec{margin-bottom:14px;}
.sl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#6060a0;margin-bottom:7px;border-bottom:1px solid #1e1e38;padding-bottom:4px;}
.fg{margin-bottom:7px;}
label.lbl{display:block;font-size:10px;color:#6060a0;margin-bottom:3px;}
input[type=text],input[type=number],select{width:100%;background:#18182a;border:1px solid #1e1e38;border-radius:6px;color:#f0f0fa;font-family:'Noto Sans JP',sans-serif;font-size:11px;padding:7px 9px;outline:none;}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:#ff6eb4;}
select option{background:#18182a;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.tg{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:8px;}
.tb{border-radius:6px;padding:6px 2px;cursor:pointer;text-align:center;font-size:8px;font-weight:700;border:2px solid transparent;line-height:1.3;}
.tb.on{border-color:#fff;}
.upbtn{display:block;width:100%;background:#18182a;border:2px dashed rgba(255,110,180,.4);border-radius:9px;padding:14px;text-align:center;cursor:pointer;font-size:11px;color:#ff6eb4;font-weight:700;transition:all .2s;}
.upbtn:hover{background:rgba(255,110,180,.1);border-color:#ff6eb4;}
.plist{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto;margin-top:8px;}
.plist::-webkit-scrollbar{width:3px;}
.plist::-webkit-scrollbar-thumb{background:#1e1e38;border-radius:2px;}
.pitem{background:#18182a;border:1px solid #1e1e38;border-radius:7px;padding:7px;display:flex;gap:7px;align-items:center;}
.pitem img{width:42px;height:42px;border-radius:5px;object-fit:contain;background:#0a0a12;flex-shrink:0;}
.pfields{flex:1;display:flex;flex-direction:column;gap:3px;}
.pfields input{font-size:10px;padding:4px 7px;}
.prow{display:flex;gap:3px;align-items:center;}
.prow input{font-size:10px;padding:4px 6px;}
.prow span{font-size:9px;color:#6060a0;white-space:nowrap;}
.pdel{background:rgba(255,60,60,.12);border:none;border-radius:4px;color:#ff5050;font-size:11px;padding:4px 7px;cursor:pointer;flex-shrink:0;}
.gbtn{width:100%;background:linear-gradient(130deg,#ff6eb4,#a855f7);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:700;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;}
.gbtn:hover{opacity:.88;}
.gbtn:disabled{opacity:.5;cursor:not-allowed;}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.pa{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;align-items:center;gap:14px;}
.abar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.abtn{background:#10101a;border:1px solid #1e1e38;border-radius:6px;color:#6060a0;font-size:10px;padding:7px 12px;cursor:pointer;}
.abtn:hover{border-color:#ff6eb4;color:#ff6eb4;}
.abtn.g{background:rgba(74,239,192,.1);border-color:rgba(74,239,192,.3);color:#4aefc0;}
.pats{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;width:100%;}
.pw{text-align:center;}
.plbl{font-size:10px;color:#6060a0;margin-bottom:6px;}
.empty{text-align:center;padding:60px 20px;color:#6060a0;}
.empty .ico{font-size:48px;margin-bottom:12px;opacity:.2;}
.empty p{font-size:12px;line-height:1.9;}
.exwrap{width:100%;max-width:1100px;}
.exh{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#6060a0;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid #1e1e38;}
.exg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.ec{background:#10101a;border:1px solid #1e1e38;border-radius:10px;padding:14px;}
.ect{font-size:10px;font-weight:700;color:#ff6eb4;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1e1e38;}
.ei{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start;}
.eico{font-size:13px;flex-shrink:0;}
.etx{font-size:10px;color:#f0f0fa;line-height:1.65;opacity:.88;}
.etx strong{color:#ff6eb4;}
</style>
</head>
<body>

<div class="sb">
  <div class="logo">BannerAI</div>
  <div class="tag">LIPSレベルの商品まとめバナーを秒で作成</div>

  <div class="sec">
    <div class="sl">バナー設定</div>
    <div class="fg"><label class="lbl">メインタイトル *</label><input type="text" id="title" placeholder="例：垢抜け眉毛メイクおすすめ10選"></div>
    <div class="fg"><label class="lbl">サブテキスト（任意）</label><input type="text" id="sub" placeholder="例：ブルベ向け・プチプラ特集"></div>
    <div class="fg"><label class="lbl">注釈（右下14px）</label><input type="text" id="note" placeholder="例：※価格は掲載時点のものです"></div>
    <div class="row2">
      <div class="fg"><label class="lbl">幅(px)</label><input type="number" id="bw" value="1080" min="400" max="2000" step="10"></div>
      <div class="fg"><label class="lbl">高さ(px)</label><input type="number" id="bh" value="1350" min="400" max="3000" step="10"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sl">テーマ</div>
    <div class="tg" id="tg">
      <div class="tb on" data-t="pink" style="background:linear-gradient(135deg,#ffb7d5,#e879f9);color:#fff">ピンク</div>
      <div class="tb" data-t="yellow" style="background:linear-gradient(135deg,#fde68a,#fb923c);color:#78350f">イエロー</div>
      <div class="tb" data-t="green" style="background:linear-gradient(135deg,#a7f3d0,#34d399);color:#064e3b">グリーン</div>
      <div class="tb" data-t="purple" style="background:linear-gradient(135deg,#c4b5fd,#8b5cf6);color:#fff">パープル</div>
      <div class="tb" data-t="blue" style="background:linear-gradient(135deg,#bae6fd,#38bdf8);color:#0c4a6e">ブルー</div>
      <div class="tb" data-t="peach" style="background:linear-gradient(135deg,#fed7aa,#fb923c);color:#7c2d12">ピーチ</div>
      <div class="tb" data-t="choco" style="background:linear-gradient(135deg,#d6b896,#92400e);color:#fff">ショコラ</div>
      <div class="tb" data-t="mint" style="background:linear-gradient(135deg,#ccfbf1,#2dd4bf);color:#134e4a">ミント</div>
      <div class="tb" data-t="berry" style="background:linear-gradient(135deg,#fda4af,#e11d48);color:#fff">ベリー</div>
      <div class="tb" data-t="orange" style="background:linear-gradient(135deg,#fed7aa,#f97316);color:#fff">オレンジ</div>
    </div>
  </div>

  <div class="sec">
    <div class="sl">商品を追加（複数一括OK）</div>
    <button class="upbtn" id="upbtn">
      📷 ここをクリックして画像を選択<br>
      <span style="font-size:9px;font-weight:400;color:#6060a0">複数選択可 · PNG推奨</span>
    </button>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
    <div class="plist" id="plist"></div>
  </div>

  <div class="sec">
    <button class="gbtn" id="gbtn">
      <span id="bt">✦ バナーを生成する（3パターン）</span>
      <div class="spin" id="sp"></div>
    </button>
  </div>
</div>

<div class="pa" id="pa">
  <div class="empty">
    <div class="ico">🎨</div>
    <p>商品画像を追加して<br>「バナーを生成する」を押してください<br><br>
    <span style="color:#4aefc0;font-size:11px">💡 3パターン同時生成<br>PNG（背景透過）推奨</span></p>
  </div>
</div>

<script>
var products = [];
var selTheme = 'pink';
var aiData = null;

var THEMES = {
  pink:{bg:'#fff0f7',bg2:'#fce7f3',c1:'#ff6eb4',c2:'#e879f9',c3:'#be185d',ct:'#831843',cs:'#9d174d',cd:'#fda4af',cf:'#ffffff'},
  yellow:{bg:'#fffbeb',bg2:'#fef3c7',c1:'#f59e0b',c2:'#ef4444',c3:'#b45309',ct:'#78350f',cs:'#92400e',cd:'#fde68a',cf:'#ffffff'},
  green:{bg:'#f0fdf4',bg2:'#dcfce7',c1:'#16a34a',c2:'#0d9488',c3:'#15803d',ct:'#14532d',cs:'#166534',cd:'#86efac',cf:'#ffffff'},
  purple:{bg:'#faf5ff',bg2:'#f3e8ff',c1:'#9333ea',c2:'#ec4899',c3:'#7e22ce',ct:'#4c1d95',cs:'#5b21b6',cd:'#c4b5fd',cf:'#ffffff'},
  blue:{bg:'#f0f9ff',bg2:'#e0f2fe',c1:'#0284c7',c2:'#6366f1',c3:'#0369a1',ct:'#0c4a6e',cs:'#075985',cd:'#7dd3fc',cf:'#ffffff'},
  peach:{bg:'#fff7ed',bg2:'#ffedd5',c1:'#f97316',c2:'#ec4899',c3:'#c2410c',ct:'#7c2d12',cs:'#9a3412',cd:'#fdba74',cf:'#ffffff'},
  choco:{bg:'#fdf8f4',bg2:'#f5ebe0',c1:'#92400e',c2:'#d97706',c3:'#78350f',ct:'#3b1a08',cs:'#4b2510',cd:'#d6b896',cf:'#ffffff'},
  mint:{bg:'#f0fdfa',bg2:'#ccfbf1',c1:'#0d9488',c2:'#6366f1',c3:'#0f766e',ct:'#134e4a',cs:'#115e59',cd:'#5eead4',cf:'#ffffff'},
  berry:{bg:'#fff1f2',bg2:'#ffe4e6',c1:'#e11d48',c2:'#fb7185',c3:'#be123c',ct:'#881337',cs:'#9f1239',cd:'#fda4af',cf:'#ffffff'},
  orange:{bg:'#fff7ed',bg2:'#ffedd5',c1:'#ea580c',c2:'#f59e0b',c3:'#c2410c',ct:'#7c2d12',cs:'#9a3412',cd:'#fdba74',cf:'#ffffff'}
};

// テーマ選択
document.querySelectorAll('#tg .tb').forEach(function(b){
  b.addEventListener('click', function(){
    document.querySelectorAll('#tg .tb').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    selTheme = b.dataset.t;
  });
});

// ファイルアップロード
document.getElementById('upbtn').addEventListener('click', function(){
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', function(e){
  var files = Array.from(e.target.files);
  if(!files.length) return;
  var loaded = 0;
  var total = files.length;
  files.forEach(function(f){
    if(!f.type.startsWith('image/')){ loaded++; if(loaded===total) renderList(); return; }
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        var id = 'p' + Date.now() + '_' + Math.floor(Math.random()*9999);
        products.push({id:id, src:ev.target.result, iw:img.naturalWidth, ih:img.naturalHeight, brand:'', name:'', price:'', size:160});
        loaded++;
        if(loaded === total) renderList();
      };
      img.onerror = function(){ loaded++; if(loaded===total) renderList(); };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });
  e.target.value = '';
});

function renderList(){
  var list = document.getElementById('plist');
  list.innerHTML = '';
  if(!products.length){
    list.innerHTML = '<div style="text-align:center;padding:10px;font-size:10px;color:#6060a0">まだ商品がありません</div>';
    return;
  }
  products.forEach(function(p){
    var d = document.createElement('div');
    d.className = 'pitem';
    d.innerHTML = '<img src="'+p.src+'" alt="">'
      +'<div class="pfields">'
      +'<input type="text" placeholder="ブランド名" value="'+p.brand+'" oninput="upd(\''+p.id+'\',\'brand\',this.value)">'
      +'<input type="text" placeholder="商品名・詳細" value="'+p.name+'" oninput="upd(\''+p.id+'\',\'name\',this.value)">'
      +'<div class="prow">'
      +'<span>サイズ:</span>'
      +'<input type="number" value="'+p.size+'" min="60" max="500" step="10" style="width:50px;" oninput="upd(\''+p.id+'\',\'size\',this.value)">'
      +'<span>px</span>'
      +'<input type="text" placeholder="価格" value="'+p.price+'" style="flex:1;margin-left:3px;" oninput="upd(\''+p.id+'\',\'price\',this.value)">'
      +'</div>'
      +'</div>'
      +'<button class="pdel" onclick="delP(\''+p.id+'\')">✕</button>';
    list.appendChild(d);
  });
}

function upd(id, field, val){
  var p = products.find(function(x){return x.id===id;});
  if(p) p[field] = field==='size' ? (parseInt(val)||100) : val;
}

function delP(id){
  products = products.filter(function(p){return p.id!==id;});
  renderList();
}

renderList();

// 生成ボタン
document.getElementById('gbtn').addEventListener('click', generate);

async function generate(){
  var title = document.getElementById('title').value.trim();
  if(!title){alert('タイトルを入力してください');return;}
  if(!products.length){alert('商品を追加してください');return;}

  var btn = document.getElementById('gbtn');
  btn.disabled = true;
  document.getElementById('bt').style.display = 'none';
  document.getElementById('sp').style.display = 'block';

  // AIでハッシュタグ・説明生成
  var thNames = {pink:'ピンク',yellow:'イエロー',green:'グリーン',purple:'パープル',blue:'ブルー',peach:'ピーチ',choco:'ショコラ',mint:'ミント',berry:'ベリー',orange:'オレンジ'};
  var prompt = 'バナー「'+title+'」(テーマ:'+thNames[selTheme]+',商品数:'+products.length+'点)のデザイン解説をしてください。JSONのみ出力:{"tags":["#タグ1","#タグ2","#タグ3","#タグ4"],"theme_reason":"テーマ選択理由30文字以内","layout_reason":"レイアウト意図30文字以内","deco_reason":"装飾意図30文字以内","p1":{"title":"パターン1特徴15文字","reason":"理由40文字"},"p2":{"title":"パターン2特徴15文字","reason":"理由40文字"},"p3":{"title":"パターン3特徴15文字","reason":"理由40文字"},"tips":["ヒント1","ヒント2","ヒント3"]}';

  try{
    var res = await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})});
    var d = await res.json();
    if(!d.error){
      var m = (d.text||'').match(/\{[\s\S]*\}/);
      if(m){
        try{ aiData = JSON.parse(m[0]); }catch(e){ aiData = null; }
      }
    }
  }catch(e){ aiData = null; }

  await renderPatterns();
  renderExplanation();

  btn.disabled = false;
  document.getElementById('bt').style.display = 'block';
  document.getElementById('sp').style.display = 'none';
}

async function renderPatterns(){
  var area = document.getElementById('pa');
  var bw = parseInt(document.getElementById('bw').value)||1080;
  var bh = parseInt(document.getElementById('bh').value)||1350;
  var maxW = Math.min(320, Math.floor((area.clientWidth-60)/3));
  var scale = maxW/bw;

  var configs = [
    {label:'パターン1：タイトル中央・商品上下', layout:'center', rot:true},
    {label:'パターン2：タイトル下部・商品上', layout:'bottom', rot:false},
    {label:'パターン3：タイトル中央・整列', layout:'center', rot:false}
  ];

  area.innerHTML = '<div class="abar"><button class="abtn g" onclick="saveAll()">⬇ 全パターン保存</button><button class="abtn" onclick="generate()">🔄 再生成</button></div><div class="pats" id="pats"></div><div id="exwrap"></div>';

  window._canvases = [];
  var pats = document.getElementById('pats');

  for(var i=0; i<3; i++){
    var cfg = configs[i];
    var canvas = await drawBanner(bw, bh, cfg, i);
    canvas.style.cssText = 'width:'+maxW+'px;height:'+Math.round(bh*scale)+'px;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.3);cursor:pointer;display:block;';
    (function(cv, idx){
      cv.addEventListener('click', function(){ saveOne(cv, idx+1); });
    })(canvas, i);
    var wrap = document.createElement('div');
    wrap.className = 'pw';
    wrap.innerHTML = '<div class="plbl">'+cfg.label+'</div>';
    wrap.appendChild(canvas);
    pats.appendChild(wrap);
    window._canvases.push(canvas);
  }
}

// ── BANNER DRAWING ──
async function drawBanner(bw, bh, cfg, seed){
  var canvas = document.createElement('canvas');
  canvas.width = bw; canvas.height = bh;
  var ctx = canvas.getContext('2d');
  var th = THEMES[selTheme] || THEMES.pink;
  var title = document.getElementById('title').value.trim();
  var sub = document.getElementById('sub').value.trim();
  var note = document.getElementById('note').value.trim();

  // 背景
  var bg = ctx.createLinearGradient(0,0,bw,bh);
  bg.addColorStop(0, th.bg); bg.addColorStop(1, th.bg2);
  ctx.fillStyle = bg; ctx.fillRect(0,0,bw,bh);

  // テクスチャ
  ctx.save(); ctx.globalAlpha = 0.07;
  for(var x=18;x<bw;x+=24) for(var y=18;y<bh;y+=24){
    ctx.fillStyle = th.c1; ctx.beginPath(); ctx.arc(x,y,1.2,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // 装飾
  drawDecos(ctx, th, bw, bh, seed);

  // タイトルゾーン計算
  var titleCY = cfg.layout==='bottom' ? bh*0.78 : bh*0.5;
  var titleZone = {y1: titleCY - bh*0.16, y2: titleCY + bh*0.16};

  // 商品配置
  var prods = products.filter(function(p){return p.src;});
  var placements = calcPlacement(prods, bw, bh, titleZone, cfg, seed);

  // 商品描画
  await drawProds(ctx, th, placements, bw, bh);

  // タイトル描画
  if(cfg.layout === 'bottom'){
    drawTitleBottom(ctx, th, title, sub, bw, bh);
  } else {
    drawTitleCenter(ctx, th, title, sub, bw, bh);
  }

  // ハッシュタグ
  var tags = (aiData && aiData.tags) ? aiData.tags : ['#コスメ','#メイク','#おすすめ','#プチプラ'];
  ctx.save();
  ctx.font = '600 '+Math.round(bw*.019)+'px Noto Sans JP';
  ctx.fillStyle = th.c1; ctx.globalAlpha = 0.65; ctx.textAlign = 'center';
  ctx.fillText(tags.join('  '), bw/2, bh-28);
  ctx.restore();

  // 注釈
  if(note){
    ctx.save();
    ctx.font = '400 14px Noto Sans JP';
    ctx.fillStyle = th.ct; ctx.globalAlpha = 0.45; ctx.textAlign = 'right';
    ctx.fillText(note, bw-18, bh-12);
    ctx.restore();
  }

  return canvas;
}

function calcPlacement(prods, bw, bh, titleZone, cfg, seed){
  var result = [];
  var rng = mkRng(seed * 99991 + 7);
  var pad = 20;

  prods.forEach(function(p, i){
    var iw = p.size || 160;
    var ih = Math.round(iw * (p.ih / p.iw) || iw);
    var rot = cfg.rot ? (rng()-0.5)*18 : 0;
    var placed = false;

    for(var t=0; t<80; t++){
      var x, y;
      if(cfg.layout === 'center'){
        if(i%2 === 0){
          y = pad + rng() * (titleZone.y1 - ih - pad*2);
        } else {
          y = titleZone.y2 + pad + rng() * (bh - titleZone.y2 - ih - pad*2 - 60);
        }
      } else {
        y = pad + rng() * (bh * 0.72 - ih - pad);
      }
      x = pad + rng() * (bw - iw - pad*2);
      x = Math.max(pad, Math.min(bw-iw-pad, x));
      y = Math.max(pad, Math.min(bh-ih-pad*4, y));

      if(cfg.layout==='center' && y+ih > titleZone.y1 && y < titleZone.y2) continue;

      var ok = true;
      for(var j=0; j<result.length; j++){
        var r = result[j];
        var gp = 28;
        if(!(x > r.x+r.w+gp || x+iw+gp < r.x || y > r.y+r.h+gp || y+ih+gp < r.y)){
          ok = false; break;
        }
      }
      if(ok){ result.push({p:p,x:x,y:y,w:iw,h:ih,rot:rot}); placed=true; break; }
    }

    if(!placed){
      var cols = 3;
      var col = i % cols;
      var row = Math.floor(i / cols);
      var cw = Math.floor((bw-pad*2)/cols);
      var iw2 = Math.min(p.size||160, cw-20);
      var ih2 = Math.round(iw2*(p.ih/p.iw)||iw2);
      result.push({p:p, x:pad+col*cw+(cw-iw2)/2, y:pad+row*220, w:iw2, h:ih2, rot:0});
    }
  });
  return result;
}

function mkRng(seed){
  var s = seed;
  return function(){
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

async function drawProds(ctx, th, placements, bw, bh){
  for(var i=0; i<placements.length; i++){
    var pl = placements[i];
    await new Promise(function(resolve){
      var img = new Image();
      img.onload = function(){
        ctx.save();
        var cx = pl.x + pl.w/2;
        var cy = pl.y + pl.h/2;
        ctx.translate(cx, cy);
        ctx.rotate(pl.rot * Math.PI / 180);
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = 16; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 4;
        ctx.drawImage(img, -pl.w/2, -pl.h/2, pl.w, pl.h);
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        ctx.restore();

        // ラベル（商品下）
        var lx = cx;
        var ly = pl.y + pl.h + 8;
        ctx.save(); ctx.textAlign = 'center';

        // ブランドバッジ
        if(pl.p.brand){
          var bf = Math.round(pl.w * 0.1) + 9;
          ctx.font = '700 '+bf+'px Zen Maru Gothic, Noto Sans JP';
          var bw2 = ctx.measureText(pl.p.brand).width + bf*1.2;
          var bh2 = bf + bf*0.6;
          ctx.fillStyle = th.c1;
          roundRect(ctx, lx-bw2/2, ly, bw2, bh2, bh2*0.5);
          ctx.fillStyle = th.cf;
          ctx.fillText(pl.p.brand, lx, ly + bf*0.88);
          ly += bh2 + 4;
        }

        // 商品名
        if(pl.p.name){
          var nf = Math.round(pl.w * 0.085) + 7;
          ctx.font = '500 '+nf+'px Noto Sans JP';
          ctx.fillStyle = th.ct;
          var lines = wrapText(ctx, pl.p.name, pl.w + 30, 2);
          lines.forEach(function(line, li){
            ctx.fillText(line, lx, ly + nf*0.9 + li*nf*1.2);
          });
          ly += lines.length * nf * 1.2 + 3;
        }

        // 価格
        if(pl.p.price){
          var pf = Math.round(pl.w * 0.09) + 7;
          ctx.font = '700 '+pf+'px Zen Maru Gothic, Noto Sans JP';
          ctx.fillStyle = th.c3;
          ctx.fillText(pl.p.price, lx, ly + pf*0.9);
        }

        ctx.restore();
        resolve();
      };
      img.onerror = function(){ resolve(); };
      img.src = pl.p.src;
    });
  }
}

function drawTitleCenter(ctx, th, title, sub, bw, bh){
  var cy = bh / 2;
  var tf = Math.round(bw * (title.length > 14 ? 0.062 : title.length > 10 ? 0.073 : 0.083));
  var lines = splitTitle(title, 12);
  var lh = tf * 1.25;
  var totalH = lines.length * lh + (sub ? 40 : 0) + 20;

  // 白い半透明背景
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  roundRect(ctx, bw*0.08, cy-totalH/2-10, bw*0.84, totalH+20, totalH*0.08);
  ctx.restore();

  var startY = cy - totalH/2 + (sub ? 38 : 10) + tf*0.8;

  // サブ
  if(sub){
    var sf = Math.round(bw*0.023);
    ctx.save();
    ctx.font = '700 '+sf+'px Zen Maru Gothic, Noto Sans JP';
    var sw = ctx.measureText(sub).width + sf*1.4;
    var sh2 = sf + sf*0.65;
    ctx.fillStyle = th.c1;
    roundRect(ctx, bw/2-sw/2, cy-totalH/2+8, sw, sh2, sh2*0.5);
    ctx.fillStyle = th.cf; ctx.textAlign = 'center';
    ctx.fillText(sub, bw/2, cy-totalH/2+8+sf*0.88);
    ctx.restore();
  }

  // タイトル
  ctx.save(); ctx.textAlign = 'center';
  lines.forEach(function(line, i){
    var y = startY + i*lh;
    ctx.font = '900 '+tf+'px Zen Maru Gothic, Noto Sans JP';
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = tf*0.1; ctx.lineJoin = 'round';
    ctx.strokeText(line, bw/2, y);
    var gr = ctx.createLinearGradient(0, y-tf, 0, y);
    gr.addColorStop(0, th.c1); gr.addColorStop(1, th.c2);
    ctx.fillStyle = gr; ctx.fillText(line, bw/2, y);
  });

  // 区切りライン
  var lineY = startY + lines.length*lh + 8;
  var lg = ctx.createLinearGradient(bw/2-160,0, bw/2+160,0);
  lg.addColorStop(0,'transparent'); lg.addColorStop(0.5,th.c1); lg.addColorStop(1,'transparent');
  ctx.strokeStyle = lg; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(bw/2-160, lineY); ctx.lineTo(bw/2+160, lineY); ctx.stroke();
  ctx.restore();
}

function drawTitleBottom(ctx, th, title, sub, bw, bh){
  var ty = bh * 0.78;
  var tf = Math.round(bw * (title.length > 14 ? 0.062 : 0.078));
  var lines = splitTitle(title, 10);
  var lh = tf * 1.2;

  ctx.save();
  var gr = ctx.createLinearGradient(0, ty-tf*0.8, 0, ty+lh*lines.length+10);
  gr.addColorStop(0,'rgba(255,255,255,0)');
  gr.addColorStop(0.2,'rgba(255,255,255,0.88)');
  gr.addColorStop(0.8,'rgba(255,255,255,0.88)');
  gr.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, ty-tf*0.8, bw, lh*lines.length+tf*0.8+20);

  if(sub){
    var sf = Math.round(bw*0.021);
    ctx.font = '700 '+sf+'px Zen Maru Gothic, Noto Sans JP';
    var sw = ctx.measureText(sub).width + sf*1.4;
    var sh = sf + sf*0.6;
    ctx.fillStyle = th.c1;
    roundRect(ctx, bw/2-sw/2, ty-tf*0.6-sh-4, sw, sh, sh*0.5);
    ctx.fillStyle = th.cf; ctx.textAlign = 'center';
    ctx.fillText(sub, bw/2, ty-tf*0.6-4+sf*0.85);
  }

  ctx.textAlign = 'center';
  lines.forEach(function(line, i){
    var y = ty + i*lh;
    ctx.font = '900 '+tf+'px Zen Maru Gothic, Noto Sans JP';
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = tf*0.1; ctx.lineJoin = 'round';
    ctx.strokeText(line, bw/2, y);
    var g2 = ctx.createLinearGradient(0,y-tf,0,y);
    g2.addColorStop(0,th.c1); g2.addColorStop(1,th.c2);
    ctx.fillStyle = g2; ctx.fillText(line, bw/2, y);
  });
  ctx.restore();
}

function drawDecos(ctx, th, bw, bh, seed){
  var rng = mkRng(seed * 54321 + 3);
  ctx.save();

  // 縦ストライプボーダー
  ctx.globalAlpha = 0.35;
  for(var y=0; y<bh; y+=20){
    ctx.fillStyle = (y%40===0) ? th.c1 : th.c2;
    ctx.fillRect(0, y, 10, 10);
    ctx.fillRect(bw-10, y+(y%40===0?10:0), 10, 10);
  }

  // 上下ウェーブ
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = th.c1; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 16);
  for(var wx=0; wx<=bw; wx+=bw/16){
    ctx.quadraticCurveTo(wx+bw/32, 0, wx+bw/16, 16);
  }
  ctx.stroke();

  ctx.strokeStyle = th.c2;
  ctx.beginPath(); ctx.moveTo(0, bh-16);
  for(var wx2=0; wx2<=bw; wx2+=bw/16){
    ctx.quadraticCurveTo(wx2+bw/32, bh, wx2+bw/16, bh-16);
  }
  ctx.stroke();

  // ハート
  var hpos = [[0.07,0.05],[0.88,0.07],[0.04,0.45],[0.93,0.52],[0.09,0.9],[0.86,0.92]];
  hpos.forEach(function(pos){
    ctx.globalAlpha = 0.18 + rng()*0.12;
    var s = bw*(0.012+rng()*0.01);
    drawHeart(ctx, pos[0]*bw, pos[1]*bh, s, th.c1);
  });

  // 星
  var spos = [[0.15,0.03],[0.72,0.05],[0.48,0.02],[0.28,0.96],[0.62,0.97],[0.84,0.94],[0.02,0.22],[0.97,0.28],[0.03,0.72],[0.96,0.78]];
  spos.forEach(function(pos){
    ctx.globalAlpha = 0.22 + rng()*0.18;
    drawStar(ctx, pos[0]*bw, pos[1]*bh, bw*(0.008+rng()*0.009), th.c2);
  });

  // 花
  [[0.91,0.25],[0.04,0.6],[0.88,0.68],[0.05,0.17]].forEach(function(pos){
    ctx.globalAlpha = 0.1 + rng()*0.08;
    drawFlower(ctx, pos[0]*bw, pos[1]*bh, bw*0.022, th.c1);
  });

  // リボン
  ctx.globalAlpha = 0.15;
  drawRibbon(ctx, bw/2, 22, bw*0.038, th.c1);

  ctx.restore();
}

function drawHeart(ctx, x, y, s, color){
  ctx.save(); ctx.fillStyle = color; ctx.translate(x,y); ctx.scale(s,s);
  ctx.beginPath(); ctx.moveTo(0,-1);
  ctx.bezierCurveTo(0,-2.5,2.5,-2.5,2.5,-0.5);
  ctx.bezierCurveTo(2.5,1,0,2.5,0,2.5);
  ctx.bezierCurveTo(0,2.5,-2.5,1,-2.5,-0.5);
  ctx.bezierCurveTo(-2.5,-2.5,0,-2.5,0,-1);
  ctx.fill(); ctx.restore();
}

function drawStar(ctx, x, y, s, color){
  ctx.save(); ctx.fillStyle = color; ctx.translate(x,y);
  ctx.beginPath();
  for(var i=0;i<5;i++){
    var a = i*Math.PI*0.4 - Math.PI/2;
    var b = a + Math.PI*0.2;
    ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
    ctx.lineTo(Math.cos(b)*s*0.4, Math.sin(b)*s*0.4);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}

function drawFlower(ctx, x, y, r, color){
  ctx.save(); ctx.fillStyle = color; ctx.translate(x,y);
  for(var i=0;i<6;i++){
    var a = i*Math.PI/3;
    ctx.beginPath();
    ctx.ellipse(Math.cos(a)*r*0.6, Math.sin(a)*r*0.6, r*0.5, r*0.28, a, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawRibbon(ctx, x, y, s, color){
  ctx.save(); ctx.fillStyle = color; ctx.translate(x,y);
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(-s,-s*1.5,-s*2,-s*0.5,-s*1.5,0);
  ctx.bezierCurveTo(-s*2,s*0.5,-s,s*1.5,0,0);
  ctx.bezierCurveTo(s,s*1.5,s*2,s*0.5,s*1.5,0);
  ctx.bezierCurveTo(s*2,-s*0.5,s,-s*1.5,0,0);
  ctx.fill(); ctx.restore();
}

function roundRect(ctx, x, y, w, h, r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}

function wrapText(ctx, text, maxW, maxLines){
  maxLines = maxLines || 999;
  var lines = [], cur = '';
  for(var i=0; i<text.length; i++){
    var ch = text[i];
    if(ctx.measureText(cur+ch).width > maxW && cur){
      lines.push(cur);
      if(lines.length >= maxLines) return lines;
      cur = ch;
    } else { cur += ch; }
  }
  if(cur && lines.length < maxLines) lines.push(cur);
  return lines;
}

function splitTitle(t, max){
  if(t.length <= max) return [t];
  var res=[], cur='';
  for(var i=0;i<t.length;i++){
    cur += t[i];
    if(cur.length >= max){ res.push(cur); cur=''; }
  }
  if(cur) res.push(cur);
  return res;
}

function saveOne(canvas, n){
  var a = document.createElement('a');
  var t = (document.getElementById('title').value||'banner').slice(0,10);
  a.download = 'banner_'+t+'_pattern'+n+'_'+Date.now()+'.jpg';
  a.href = canvas.toDataURL('image/jpeg', 0.95);
  a.click();
}

function saveAll(){
  if(!window._canvases) return;
  window._canvases.forEach(function(c,i){
    setTimeout(function(){ saveOne(c, i+1); }, (i+1)*300);
  });
}
