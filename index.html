<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIEF — デザインの方向性を、秒で決める。</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07060f;--s1:#0f0e1e;--s2:#16152a;--a1:#7c6aff;--a2:#ff6a8a;--a3:#ffd93d;--a4:#4aefc0;--tx:#f0f0fa;--mu:#6060a0;--bd:#22203a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 15%,rgba(124,106,255,.12) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(255,106,138,.08) 0%,transparent 55%);pointer-events:none;z-index:0;}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}

/* HEADER */
.header{padding:24px 0 12px;display:flex;align-items:flex-end;justify-content:space-between;}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(130deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;}
.logo-sub{font-size:10px;color:var(--mu);margin-top:2px;}
.header-badge{background:rgba(124,106,255,.15);border:1px solid rgba(124,106,255,.3);color:var(--a1);font-size:9px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;}

/* HERO */
.hero{padding:20px 0 28px;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,52px);font-weight:800;line-height:1.08;letter-spacing:-2px;margin-bottom:10px;}
.hero h1 em{font-style:normal;background:linear-gradient(130deg,var(--a1),var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{color:var(--mu);font-size:12px;line-height:1.8;max-width:560px;}

/* FORM */
.fcard{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:24px;margin-bottom:24px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:620px){.fgrid{grid-template-columns:1fr;}}
.fg{margin-bottom:0;}
.fg label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:4px;}
.fg label .req{color:var(--a2);}
input[type=text],select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:9px 12px;outline:none;transition:border-color .2s;}
input[type=text]:focus,select:focus{border-color:var(--a1);}
select option{background:var(--s2);}
.fg-full{grid-column:1/-1;}
.gbtn{width:100%;background:linear-gradient(130deg,var(--a1),var(--a2));border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:14px;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s,transform .1s;}
.gbtn:hover{opacity:.88;transform:translateY(-1px);}
.gbtn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* OUTPUT */
.out{display:flex;flex-direction:column;gap:20px;}
.empty{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:60px 24px;text-align:center;color:var(--mu);}
.empty-ico{font-size:52px;margin-bottom:14px;opacity:.2;}
.empty-txt{font-size:13px;line-height:1.9;}
.empty-hint{margin-top:10px;font-size:11px;color:var(--a4);}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:60px;gap:16px;}
.loading-bar{width:240px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden;}
.loading-bar-inner{height:100%;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:2px;animation:lb 1.8s ease-in-out infinite;}
@keyframes lb{0%{width:0%;margin-left:0;}50%{width:60%;margin-left:20%;}100%{width:0%;margin-left:100%;};}
.loading-txt{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.loading-sub{font-size:11px;color:var(--mu);}

/* RESULT HEADER */
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--bd);}
.result-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.result-meta{font-size:10px;color:var(--mu);margin-top:2px;}
.copy-all-btn{background:rgba(124,106,255,.12);border:1px solid rgba(124,106,255,.25);border-radius:7px;color:var(--a1);font-size:10px;font-weight:700;padding:8px 14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.copy-all-btn:hover{background:rgba(124,106,255,.22);}

/* COLOR CUSTOMIZER */
.color-panel{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:20px;}
.cp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cp-title{font-size:11px;font-weight:700;color:var(--tx);}
.cp-sub{font-size:10px;color:var(--mu);}
.cp-body{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.cp-body{grid-template-columns:1fr;}}

/* Color presets */
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.preset-btn{display:flex;gap:3px;align-items:center;padding:5px 10px;border-radius:6px;cursor:pointer;border:1.5px solid var(--bd);background:var(--s2);transition:all .15s;}
.preset-btn:hover,.preset-btn.active{border-color:var(--a1);}
.preset-dot{width:12px;height:12px;border-radius:50%;}
.preset-name{font-size:9px;color:var(--mu);font-weight:600;}

/* Color inputs */
.color-inputs{display:flex;flex-direction:column;gap:8px;}
.ci{display:flex;align-items:center;gap:10px;}
.ci label{font-size:10px;color:var(--mu);width:80px;flex-shrink:0;}
.ci input[type=color]{width:36px;height:28px;border:none;border-radius:6px;cursor:pointer;padding:2px;background:var(--s2);}
.ci input[type=text]{flex:1;font-size:11px;padding:5px 9px;}

/* IDEA CARDS - 2x2 grid */
.ideas{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:700px){.ideas{grid-template-columns:1fr;}}

.icard{background:var(--s1);border:1.5px solid var(--bd);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s,border-color .2s;animation:cardIn .4s ease forwards;opacity:0;}
.icard:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.5);border-color:rgba(124,106,255,.3);}
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.card-inner{display:grid;grid-template-columns:1fr 1fr;gap:0;}

/* LEFT: Layout preview */
.card-preview{position:relative;background:var(--s2);}
.card-preview svg{width:100%;height:100%;display:block;min-height:220px;}

/* RIGHT: Info */
.card-info{padding:18px;display:flex;flex-direction:column;gap:10px;}
.card-num{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.card-layout-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;line-height:1.3;color:var(--tx);}
.card-why{font-size:11px;color:var(--tx);line-height:1.85;opacity:.85;flex:1;}
.card-why-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--a1);margin-bottom:4px;}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;}
.tag-mood{background:rgba(74,239,192,.1);color:var(--a4);}
.tag-font{background:rgba(124,106,255,.15);color:var(--a1);}

/* Refs */
.refs{border-top:1px solid var(--bd);padding-top:10px;}
.refs-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;}
.ref-list{display:flex;flex-direction:column;gap:3px;}
.ref-a{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;text-decoration:none;transition:all .15s;font-size:10px;}
.ref-a:hover{border-color:var(--a1);background:rgba(124,106,255,.08);}
.ref-ico{font-size:12px;flex-shrink:0;}
.ref-info{flex:1;min-width:0;}
.ref-site{font-size:10px;font-weight:700;color:var(--tx);}
.ref-kw{font-size:9px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ref-arr{font-size:10px;color:var(--mu);}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--a1);color:#fff;font-size:11px;font-weight:700;padding:10px 18px;border-radius:6px;opacity:0;pointer-events:none;transition:all .25s;z-index:999;transform:translateY(8px);}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="wrap">
  <div class="header">
    <div><div class="logo">BRIEF</div><div class="logo-sub">デザインの方向性を、秒で決める。</div></div>
    <div class="header-badge">powered by Claude</div>
  </div>

  <div class="hero">
    <h1>デザインの方向性を、<br><em>秒で決める。</em></h1>
    <p>案件情報を入れるだけで、AIが4つの異なるレイアウト案を提案。色は自分でカスタマイズできます。</p>
  </div>

  <div class="fcard">
    <div class="fgrid">
      <div class="fg fg-full"><label>案件名・制作物 <span class="req">*</span></label><input type="text" id="project" placeholder="例：夏の新作コスメ紹介バナー、マリノスのイベント告知"></div>
      <div class="fg"><label>ターゲット層</label><input type="text" id="target" placeholder="例：20〜30代女性"></div>
      <div class="fg"><label>媒体・サイズ</label>
        <select id="media">
          <option value="Instagram正方形 1080×1080px">Instagram正方形</option>
          <option value="Instagramストーリー 1080×1920px">ストーリー縦</option>
          <option value="OGP横長 1200×628px">OGP横長</option>
          <option value="Webバナー 728×90px">Web横長バナー</option>
          <option value="LPヘッダー 1920×600px">LPヘッダー</option>
          <option value="X(Twitter)投稿 1200×1500px">X投稿 1200×1500</option>
          <option value="マリノスWeb 780×410px">マリノスWeb 780×410</option>
        </select>
      </div>
      <div class="fg"><label>雰囲気・トーン</label>
        <select id="tone">
          <option>かわいい・ポップ</option><option>おしゃれ・高級感</option>
          <option>クール・スタイリッシュ</option><option>ナチュラル・やわらか</option>
          <option>信頼感・誠実</option><option>インパクト重視</option><option>シンプル・ミニマル</option>
        </select>
      </div>
      <div class="fg fg-full"><label>その他メモ（任意）</label><input type="text" id="notes" placeholder="例：既存バナーと統一感を出したい、文字多め"></div>
    </div>
    <button class="gbtn" id="gbtn">
      <span id="bt">✦ レイアウト案を生成する</span>
      <div class="spin" id="sp"></div>
    </button>
  </div>

  <div class="out" id="out">
    <div class="empty">
      <div class="empty-ico">✏️</div>
      <div class="empty-txt">案件情報を入力して「レイアウト案を生成する」を押してください</div>
      <div class="empty-hint">✦ 4つの異なるレイアウト案 ＋ なぜそのデザインか ＋ 参考リンク</div>
    </div>
  </div>
</div>

<script>
var D = null;
var userColors = { bg: '#1a1a2e', accent: '#7c6aff', text: '#ffffff', sub: '#cccccc' };

var COLOR_PRESETS = [
  { name: 'ナイト', colors: { bg: '#1a1a2e', accent: '#7c6aff', text: '#ffffff', sub: '#cccccc' } },
  { name: 'ピンク', colors: { bg: '#fff0f7', accent: '#ff6eb4', text: '#831843', sub: '#9d174d' } },
  { name: 'イエロー', colors: { bg: '#fffbeb', accent: '#f59e0b', text: '#78350f', sub: '#92400e' } },
  { name: 'グリーン', colors: { bg: '#f0fdf4', accent: '#16a34a', text: '#14532d', sub: '#166534' } },
  { name: 'ベリー', colors: { bg: '#fff1f2', accent: '#e11d48', text: '#881337', sub: '#9f1239' } },
  { name: 'ショコラ', colors: { bg: '#fdf8f4', accent: '#92400e', text: '#3b1a08', sub: '#4b2510' } },
];

function getKey(){
  if(window.CK) return window.CK;
  var k = localStorage.getItem('ck');
  if(k){ window.CK = k; return k; }
  k = window.prompt('Claude APIキー（sk-ant-...）を入力\n※次回から不要です');
  if(k){ window.CK = k; localStorage.setItem('ck', k); }
  return k || '';
}

document.getElementById('gbtn').addEventListener('click', generate);

async function generate(){
  var project = document.getElementById('project').value.trim();
  if(!project){ alert('案件名を入力してください'); return; }
  var target = document.getElementById('target').value.trim();
  var media = document.getElementById('media').value;
  var tone = document.getElementById('tone').value;
  var notes = document.getElementById('notes').value.trim();

  document.getElementById('gbtn').disabled = true;
  document.getElementById('bt').style.display = 'none';
  document.getElementById('sp').style.display = 'block';
  document.getElementById('out').innerHTML = '<div class="loading"><div class="loading-txt">AIがレイアウトを考えています</div><div class="loading-bar"><div class="loading-bar-inner"></div></div><div class="loading-sub">4つの異なる構成を生成中...</div></div>';

  var prompt =
    'あなたはプロのグラフィックデザイナーです。以下の案件のバナーレイアウト案を4つ提案してください。'
    + '案件：' + project + ' ターゲット：' + (target||'未指定') + ' 媒体：' + media + ' トーン：' + tone + ' ' + (notes?'メモ：'+notes:'')
    + ' 重要：4案はレイアウト構成が全て異なること（中央集中・左右分割・上下分割・斜め対角）。'
    + ' 各案の「なぜこのレイアウトか」の理由を具体的に（ターゲット心理・視線誘導・媒体特性を踏まえて）。'
    + ' JSONのみ出力（説明文不要）:'
    + '{"ideas":['
    + '{"layout_name":"レイアウト名10文字","layout_type":"center","why":"なぜこのレイアウトがこの案件・ターゲットに効果的か。視線誘導・心理的効果・媒体との相性を具体的に80文字","mood":"キーワード8文字","font":"推奨フォント方向性15文字","pinterest_kw":"日本語6文字","behance_kw":"英語3単語","google_kw":"日本語8文字"},'
    + '{"layout_name":"...","layout_type":"leftright","why":"80文字","mood":"...","font":"...","pinterest_kw":"...","behance_kw":"...","google_kw":"..."},'
    + '{"layout_name":"...","layout_type":"topbottom","why":"80文字","mood":"...","font":"...","pinterest_kw":"...","behance_kw":"...","google_kw":"..."},'
    + '{"layout_name":"...","layout_type":"diagonal","why":"80文字","mood":"...","font":"...","pinterest_kw":"...","behance_kw":"...","google_kw":"..."}]}';

  try{
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': getKey(), 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 2000, messages: [{ role: 'user', content: prompt }] })
    });
    var d = await res.json();
    if(d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    var text = (d.content && d.content[0] && d.content[0].text) || '';
    var m = text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('JSONが見つかりません');
    var jsonStr = m[0].replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,'').replace(/\r\n|\r|\n/g,' ').replace(/\t/g,' ').replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
    try{ D = JSON.parse(jsonStr); }
    catch(e2){
      jsonStr = jsonStr.replace(/"([^"]*)"/g, function(match,p1){ return '"'+p1.replace(/[\x00-\x1F]/g,' ')+'"'; });
      D = JSON.parse(jsonStr);
    }
    render(project, target, media, tone);
  } catch(e){
    console.error(e);
    document.getElementById('out').innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">エラー: '+esc(e.message)+'</div></div>';
  } finally {
    document.getElementById('gbtn').disabled = false;
    document.getElementById('bt').style.display = 'block';
    document.getElementById('sp').style.display = 'none';
  }
}

function render(project, target, media, tone){
  var out = document.getElementById('out');
  out.innerHTML = '';

  // Result header
  var rh = document.createElement('div');
  rh.className = 'result-header';
  rh.innerHTML = '<div><div class="result-title">レイアウト案 4パターン — '+esc(project)+'</div><div class="result-meta">'+esc(media)+' · '+esc(tone)+(target?' · '+esc(target):'')+'</div></div>'
    + '<button class="copy-all-btn" onclick="copyAll()">📋 全案をコピー</button>';
  out.appendChild(rh);

  // Color customizer
  var cp = document.createElement('div');
  cp.className = 'color-panel';
  cp.innerHTML = '<div class="cp-header"><div><div class="cp-title">🎨 カラーカスタマイズ</div><div class="cp-sub">先方の指定カラーに合わせて自由に変更できます</div></div></div>'
    + '<div class="presets" id="presets">'
    + COLOR_PRESETS.map(function(p,i){
        return '<div class="preset-btn'+(i===0?' active':'')+'" onclick="applyPreset('+i+')">'
          +'<div class="preset-dot" style="background:'+p.colors.accent+'"></div>'
          +'<div class="preset-dot" style="background:'+p.colors.bg+'"></div>'
          +'<span class="preset-name">'+p.name+'</span></div>';
      }).join('')
    + '</div>'
    + '<div class="color-inputs">'
    + '<div class="ci"><label>背景色</label><input type="color" id="col-bg" value="'+userColors.bg+'" oninput="onColorChange()"><input type="text" id="txt-bg" value="'+userColors.bg+'" oninput="onColorText(\'bg\',this.value)"></div>'
    + '<div class="ci"><label>アクセント</label><input type="color" id="col-accent" value="'+userColors.accent+'" oninput="onColorChange()"><input type="text" id="txt-accent" value="'+userColors.accent+'" oninput="onColorText(\'accent\',this.value)"></div>'
    + '<div class="ci"><label>テキスト</label><input type="color" id="col-text" value="'+userColors.text+'" oninput="onColorChange()"><input type="text" id="txt-text" value="'+userColors.text+'" oninput="onColorText(\'text\',this.value)"></div>'
    + '</div>';
  out.appendChild(cp);

  // Cards
  var grid = document.createElement('div');
  grid.className = 'ideas';
  grid.id = 'ideaGrid';
  out.appendChild(grid);

  renderCards();
}

function applyPreset(i){
  var p = COLOR_PRESETS[i];
  userColors = Object.assign({}, p.colors);
  document.getElementById('col-bg').value = userColors.bg;
  document.getElementById('txt-bg').value = userColors.bg;
  document.getElementById('col-accent').value = userColors.accent;
  document.getElementById('txt-accent').value = userColors.accent;
  document.getElementById('col-text').value = userColors.text;
  document.getElementById('txt-text').value = userColors.text;
  document.querySelectorAll('.preset-btn').forEach(function(b,bi){ b.classList.toggle('active', bi===i); });
  renderCards();
}

function onColorChange(){
  userColors.bg = document.getElementById('col-bg').value;
  userColors.accent = document.getElementById('col-accent').value;
  userColors.text = document.getElementById('col-text').value;
  document.getElementById('txt-bg').value = userColors.bg;
  document.getElementById('txt-accent').value = userColors.accent;
  document.getElementById('txt-text').value = userColors.text;
  renderCards();
}

function onColorText(key, val){
  if(/^#[0-9a-fA-F]{6}$/.test(val)){
    userColors[key] = val;
    document.getElementById('col-'+key).value = val;
    renderCards();
  }
}

function renderCards(){
  if(!D) return;
  var grid = document.getElementById('ideaGrid');
  if(!grid) return;
  grid.innerHTML = '';

  (D.ideas||[]).forEach(function(idea, i){
    var pq = encodeURIComponent(idea.pinterest_kw||'');
    var bq = encodeURIComponent(idea.behance_kw||'');
    var gq = encodeURIComponent(idea.google_kw||'');
    var acc = userColors.accent;
    var accColors = ['#7c6aff','#ff6a8a','#ffd93d','#4aefc0'];

    var card = document.createElement('div');
    card.className = 'icard';
    card.style.animationDelay = (i*0.1)+'s';

    card.innerHTML =
      '<div class="card-inner">'
      // LEFT: Layout preview
      + '<div class="card-preview">' + makeLayout(idea.layout_type, i) + '</div>'
      // RIGHT: Info
      + '<div class="card-info">'
      + '<div class="card-num" style="color:'+esc(accColors[i%4])+'">LAYOUT 0'+(i+1)+'</div>'
      + '<div class="card-layout-name">'+esc(idea.layout_name||'')+'</div>'
      + '<div>'
      + '<div class="card-why-label">なぜこのレイアウトか</div>'
      + '<div class="card-why">'+esc(idea.why||'')+'</div>'
      + '</div>'
      + '<div class="tags">'
      + '<span class="tag tag-mood">'+esc(idea.mood||'')+'</span>'
      + '<span class="tag tag-font">🔤 '+esc(idea.font||'')+'</span>'
      + '</div>'
      + '<div class="refs"><div class="refs-label">参考画像</div>'
      + '<div class="ref-list">'
      + '<a class="ref-a" href="https://jp.pinterest.com/search/pins/?q='+pq+'" target="_blank" rel="noopener"><span class="ref-ico">📌</span><div class="ref-info"><div class="ref-site">Pinterest</div><div class="ref-kw">'+esc(idea.pinterest_kw||'')+'</div></div><span class="ref-arr">↗</span></a>'
      + '<a class="ref-a" href="https://www.behance.net/search/projects/?search='+bq+'" target="_blank" rel="noopener"><span class="ref-ico">🎨</span><div class="ref-info"><div class="ref-site">Behance</div><div class="ref-kw">'+esc(idea.behance_kw||'')+'</div></div><span class="ref-arr">↗</span></a>'
      + '<a class="ref-a" href="https://www.google.com/search?q='+gq+'&tbm=isch" target="_blank" rel="noopener"><span class="ref-ico">🔍</span><div class="ref-info"><div class="ref-site">Google画像</div><div class="ref-kw">'+esc(idea.google_kw||'')+'</div></div><span class="ref-arr">↗</span></a>'
      + '</div></div>'
      + '</div>'
      + '</div>';

    grid.appendChild(card);
  });
}

function makeLayout(type, idx){
  var W = 240, H = 300;
  var bg = userColors.bg || '#1a1a2e';
  var acc = userColors.accent || '#7c6aff';
  var tx = userColors.text || '#ffffff';
  var accAlpha = acc;

  // テキストの明度を自動判定
  var isDark = isColorDark(bg);
  var txtOpHigh = isDark ? '0.95' : '0.9';
  var txtOpMid = isDark ? '0.6' : '0.5';
  var txtOpLow = isDark ? '0.2' : '0.15';

  var content = '';

  if(type === 'center' || idx === 0){
    // ── 中央集中レイアウト ──
    // 背景グラデ風の色分け
    content +=
      // 上部帯
      '<rect x="0" y="0" width="'+W+'" height="5" fill="'+esc(acc)+'"/>'
      // 中央ホワイトゾーン（タイトルエリア）
      + '<rect x="20" y="'+(H*.22)+'" width="'+(W-40)+'" height="'+(H*.44)+'" fill="'+esc(acc)+'" opacity=".1" rx="10"/>'
      // サブバッジ
      + '<rect x="'+(W/2-38)+'" y="'+(H*.24)+'" width="76" height="16" fill="'+esc(acc)+'" rx="8"/>'
      + '<text x="'+(W/2)+'" y="'+(H*.24+11)+'" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="'+esc(bg)+'">SPECIAL ITEM</text>'
      // メインタイトル（2行・大）
      + '<rect x="26" y="'+(H*.36)+'" width="'+(W-52)+'" height="26" fill="'+esc(tx)+'" opacity="'+txtOpHigh+'" rx="2"/>'
      + '<rect x="32" y="'+(H*.43)+'" width="'+(W-64)+'" height="18" fill="'+esc(tx)+'" opacity="'+txtOpMid+'" rx="2"/>'
      // アクセントライン
      + '<rect x="'+(W/2-20)+'" y="'+(H*.52)+'" width="40" height="2.5" fill="'+esc(acc)+'" rx="1.5"/>'
      // サブテキスト
      + '<rect x="'+(W/2-50)+'" y="'+(H*.56)+'" width="100" height="7" fill="'+esc(tx)+'" opacity="'+txtOpLow+'" rx="2"/>'
      // CTAボタン
      + '<rect x="'+(W/2-38)+'" y="'+(H*.62)+'" width="76" height="22" fill="'+esc(acc)+'" rx="11"/>'
      + '<text x="'+(W/2)+'" y="'+(H*.62+15)+'" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="'+esc(bg)+'">詳しく見る →</text>'
      // 四隅の商品/素材イメージ
      + '<rect x="8" y="'+(H*.06)+'" width="55" height="55" fill="'+esc(tx)+'" opacity="0.06" rx="6"/>'
      + '<ellipse cx="35" cy="'+(H*.06+27)+'" rx="18" ry="18" fill="'+esc(acc)+'" opacity="0.08"/>'
      + '<rect x="'+(W-63)+'" y="'+(H*.06)+'" width="55" height="55" fill="'+esc(tx)+'" opacity="0.06" rx="6"/>'
      + '<ellipse cx="'+(W-36)+'" cy="'+(H*.06+27)+'" rx="18" ry="18" fill="'+esc(acc)+'" opacity="0.08"/>'
      + '<rect x="8" y="'+(H*.76)+'" width="55" height="55" fill="'+esc(tx)+'" opacity="0.06" rx="6"/>'
      + '<rect x="'+(W-63)+'" y="'+(H*.76)+'" width="55" height="55" fill="'+esc(tx)+'" opacity="0.06" rx="6"/>'
      // 下部ライン
      + '<rect x="0" y="'+(H-5)+'" width="'+W+'" height="5" fill="'+esc(acc)+'"/>';

  } else if(type === 'leftright' || idx === 1){
    // ── 左右分割レイアウト ──
    var divX = W * 0.46;
    content +=
      // 左半分：アクセントカラー背景
      '<rect x="0" y="0" width="'+divX+'" height="'+H+'" fill="'+esc(acc)+'" opacity=".18"/>'
      // 右半分：画像エリア
      + '<rect x="'+divX+'" y="0" width="'+(W-divX)+'" height="'+H+'" fill="'+esc(tx)+'" opacity="0.04"/>'
      // 縦区切りライン
      + '<rect x="'+(divX-1)+'" y="0" width="2" height="'+H+'" fill="'+esc(acc)+'" opacity="0.5"/>'
      // 上部ライン
      + '<rect x="0" y="0" width="'+W+'" height="4" fill="'+esc(acc)+'"/>'
      // 左：ブランドバッジ
      + '<rect x="10" y="16" width="60" height="13" fill="'+esc(acc)+'" opacity="0.8" rx="6"/>'
      + '<text x="40" y="26" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="'+esc(bg)+'">BRAND</text>'
      // 左：メインタイトル
      + '<rect x="10" y="38" width="'+(divX-18)+'" height="24" fill="'+esc(tx)+'" opacity="'+txtOpHigh+'" rx="2"/>'
      + '<rect x="10" y="65" width="'+(divX-24)+'" height="16" fill="'+esc(tx)+'" opacity="'+txtOpMid+'" rx="2"/>'
      // 左：サブテキスト3行
      + '<rect x="10" y="90" width="'+(divX-20)+'" height="6" fill="'+esc(tx)+'" opacity="'+txtOpLow+'" rx="2"/>'
      + '<rect x="10" y="100" width="'+(divX-28)+'" height="6" fill="'+esc(tx)+'" opacity="'+txtOpLow+'" rx="2"/>'
      + '<rect x="10" y="110" width="'+(divX-32)+'" height="6" fill="'+esc(tx)+'" opacity="'+txtOpLow+'" rx="2"/>'
      // 左：CTAボタン
      + '<rect x="10" y="128" width="70" height="20" fill="'+esc(acc)+'" rx="10"/>'
      + '<text x="45" y="141" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="'+esc(bg)+'">詳しく見る</text>'
      // 右：メイン画像エリア
      + '<rect x="'+(divX+8)+'" y="10" width="'+(W-divX-16)+'" height="'+(H-20)+'" fill="'+esc(tx)+'" opacity="0.07" rx="8"/>'
      // 右：画像内の要素（商品イメージ）
      + '<ellipse cx="'+(divX+(W-divX)/2)+'" cy="'+(H/2)+'" rx="'+(W-divX)*0.28+'" ry="'+(H*0.28)+'" fill="'+esc(acc)+'" opacity="0.08"/>'
      + '<rect x="'+(divX+16)+'" y="'+(H*.22)+'" width="'+(W-divX-32)+'" height="'+(H*.55)+'" fill="'+esc(tx)+'" opacity="0.05" rx="5"/>'
      // 下部ライン
      + '<rect x="0" y="'+(H-4)+'" width="'+W+'" height="4" fill="'+esc(acc)+'"/>';

  } else if(type === 'topbottom' || idx === 2){
    // ── 上下分割レイアウト ──
    var divY = H * 0.42;
    content +=
      // 上部タイトルゾーン
      '<rect x="0" y="0" width="'+W+'" height="'+divY+'" fill="'+esc(acc)+'" opacity="0.15"/>'
      + '<rect x="0" y="0" width="'+W+'" height="4" fill="'+esc(acc)+'"/>'
      // サブバッジ（上部）
      + '<rect x="'+(W/2-45)+'" y="12" width="90" height="14" fill="'+esc(acc)+'" opacity="0.7" rx="7"/>'
      + '<text x="'+(W/2)+'" y="22.5" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="'+esc(bg)+'">SPECIAL FEATURE</text>'
      // メインタイトル（大・中央）
      + '<rect x="16" y="34" width="'+(W-32)+'" height="28" fill="'+esc(tx)+'" opacity="'+txtOpHigh+'" rx="2"/>'
      + '<rect x="22" y="65" width="'+(W-44)+'" height="18" fill="'+esc(tx)+'" opacity="'+txtOpMid+'" rx="2"/>'
      // CTAボタン（上部内）
      + '<rect x="'+(W/2-36)+'" y="90" width="72" height="20" fill="'+esc(acc)+'" rx="10"/>'
      + '<text x="'+(W/2)+'" y="103" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="'+esc(bg)+'">詳しく見る →</text>'
      // 区切りライン
      + '<rect x="0" y="'+divY+'" width="'+W+'" height="3" fill="'+esc(acc)+'" opacity="0.5"/>'
      // 下部：商品グリッド（4列）
      + [0,1,2,3].map(function(j){
          var cw = (W-20)/4;
          var x = 10 + j*cw;
          var y = divY + 10;
          var ch = H - divY - 30;
          return '<rect x="'+x+'" y="'+y+'" width="'+(cw-6)+'" height="'+ch+'" fill="'+esc(tx)+'" opacity="0.07" rx="5"/>'
            + '<rect x="'+(x+4)+'" y="'+(y+4)+'" width="'+(cw-14)+'" height="'+(ch*0.6)+'" fill="'+esc(acc)+'" opacity="0.06" rx="3"/>'
            + '<rect x="'+(x+4)+'" y="'+(y+ch*0.68)+'" width="'+(cw-14)+'" height="5" fill="'+esc(tx)+'" opacity="0.12" rx="2"/>'
            + '<rect x="'+(x+8)+'" y="'+(y+ch*0.78)+'" width="'+(cw-22)+'" height="4" fill="'+esc(acc)+'" opacity="0.4" rx="2"/>';
        }).join('')
      // 下部ライン
      + '<rect x="0" y="'+(H-4)+'" width="'+W+'" height="4" fill="'+esc(acc)+'"/>';

  } else {
    // ── 対角線レイアウト ──
    content +=
      // 対角ポリゴン（左上）
      '<polygon points="0,0 '+(W*.72)+',0 0,'+(H*.65)+'" fill="'+esc(acc)+'" opacity="0.18"/>'
      // 対角ポリゴン（右下）
      + '<polygon points="'+W+','+(H*.35)+' '+W+','+H+' '+(W*.28)+','+H+'" fill="'+esc(tx)+'" opacity="0.04"/>'
      // 対角ライン
      + '<line x1="'+(W*.72)+'" y1="0" x2="'+(W*.28)+'" y2="'+H+'" stroke="'+esc(acc)+'" stroke-width="2.5" opacity="0.6"/>'
      // 上部ライン
      + '<rect x="0" y="0" width="'+W+'" height="4" fill="'+esc(acc)+'"/>'
      // 左上：ブランドバッジ
      + '<rect x="12" y="14" width="58" height="13" fill="'+esc(acc)+'" opacity="0.8" rx="6"/>'
      + '<text x="41" y="24" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="'+esc(bg)+'">BRAND</text>'
      // 左上：メインタイトル
      + '<rect x="12" y="36" width="'+(W*.5)+'" height="26" fill="'+esc(tx)+'" opacity="'+txtOpHigh+'" rx="2"/>'
      + '<rect x="12" y="65" width="'+(W*.44)+'" height="17" fill="'+esc(tx)+'" opacity="'+txtOpMid+'" rx="2"/>'
      // 左：サブテキスト
      + '<rect x="12" y="90" width="'+(W*.36)+'" height="6" fill="'+esc(tx)+'" opacity="'+txtOpLow+'" rx="2"/>'
      + '<rect x="12" y="100" width="'+(W*.3)+'" height="6" fill="'+esc(tx)+'" opacity="'+txtOpLow+'" rx="2"/>'
      // 左：CTAボタン
      + '<rect x="12" y="116" width="68" height="21" fill="'+esc(acc)+'" rx="10.5"/>'
      + '<text x="46" y="130" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="'+esc(bg)+'">詳しく見る</text>'
      // 右下：画像エリア（大）
      + '<rect x="'+(W*.46)+'" y="'+(H*.18)+'" width="'+(W*.48)+'" height="'+(H*.58)+'" fill="'+esc(tx)+'" opacity="0.07" rx="8"/>'
      + '<ellipse cx="'+(W*.7)+'" cy="'+(H*.47)+'" rx="'+(W*.16)+'" ry="'+(H*.2)+'" fill="'+esc(acc)+'" opacity="0.06"/>'
      // 右下コーナーデコ
      + '<circle cx="'+(W*.88)+'" cy="'+(H*.88)+'" r="18" fill="'+esc(acc)+'" opacity="0.1"/>'
      + '<circle cx="'+(W*.88)+'" cy="'+(H*.88)+'" r="10" fill="'+esc(acc)+'" opacity="0.12"/>'
      // 下部ライン
      + '<rect x="0" y="'+(H-4)+'" width="'+W+'" height="4" fill="'+esc(acc)+'"/>';
  }

  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="min-height:240px">'
    + '<rect width="'+W+'" height="'+H+'" fill="'+esc(bg)+'"/>'
    + content
    + '</svg>';
}

function isColorDark(hex){
  var r=parseInt(hex.slice(1,3),16)||0;
  var g=parseInt(hex.slice(3,5),16)||0;
  var b=parseInt(hex.slice(5,7),16)||0;
  return (r*0.299+g*0.587+b*0.114) < 128;
}

function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
function copyAll(){
  if(!D) return;
  var project = document.getElementById('project').value;
  var txt = '【BRIEF — レイアウト案】\n案件：'+project+'\n媒体：'+document.getElementById('media').value+'\n\n';
  (D.ideas||[]).forEach(function(idea,i){
    txt += '━━━━━━━━━━\n【LAYOUT 0'+(i+1)+'：'+idea.layout_name+'】\n';
    txt += '▶ なぜこのレイアウトか\n'+idea.why+'\n';
    txt += '▶ キーワード：'+idea.mood+'\n';
    txt += '▶ フォント：'+idea.font+'\n';
    txt += '▶ 参考：Pinterest「'+idea.pinterest_kw+'」\n\n';
  });
  navigator.clipboard.writeText(txt).then(function(){ showToast('コピーしました！'); });
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
