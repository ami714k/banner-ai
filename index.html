<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BannerAI — 商品まとめバナージェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── APP UI ── */
:root{--bg:#08080f;--s1:#10101a;--s2:#18182a;--s3:#202030;--a1:#ff6eb4;--a2:#a855f7;--a3:#ffd93d;--tx:#f0f0fa;--mu:#6060a0;--bd:#1e1e38;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
.app{display:grid;grid-template-columns:380px 1fr;gap:0;min-height:100vh;}
@media(max-width:900px){.app{grid-template-columns:1fr;}}

/* LEFT SIDEBAR */
.sidebar{background:var(--s1);border-right:1px solid var(--bd);padding:20px;overflow-y:auto;height:100vh;position:sticky;top:0;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(130deg,#ff6eb4,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.tagline{font-size:11px;color:var(--mu);margin-bottom:20px;}
.section{margin-bottom:18px;}
.sec-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:10px;}
.fg{margin-bottom:10px;}
label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;}
input,textarea,select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:8px 10px;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--a1);}
select option{background:var(--s2);}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--mu);font-size:10px;font-weight:500;padding:4px 8px;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;}
.chip:hover,.chip.on{background:rgba(255,110,180,.15);border-color:var(--a1);color:var(--a1);}

/* Theme grid */
.theme-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.tbtn{border-radius:8px;padding:7px 4px;cursor:pointer;text-align:center;font-size:8px;font-weight:700;border:2px solid transparent;transition:all .18s;line-height:1.3;}
.tbtn.on{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.3);}

/* Products */
.prod-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;padding-right:2px;}
.prod-list::-webkit-scrollbar{width:3px;}
.prod-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.pitem{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px;}
.pitem-top{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;}
.pimg{width:52px;height:52px;border-radius:7px;object-fit:contain;background:var(--s3);border:1px solid var(--bd);flex-shrink:0;}
.pimg-ph{width:52px;height:52px;border-radius:7px;background:var(--s3);border:1.5px dashed var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;position:relative;overflow:hidden;transition:border-color .2s;}
.pimg-ph:hover{border-color:var(--a1);}
.pimg-ph input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pfields{flex:1;display:flex;flex-direction:column;gap:3px;}
.pfields input{font-size:11px;padding:5px 7px;}
.pdel{background:rgba(255,60,60,.12);border:1px solid rgba(255,60,60,.2);border-radius:5px;color:#ff5050;font-size:9px;padding:3px 6px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.pdel:hover{background:rgba(255,60,60,.25);}
.add-btn{width:100%;background:rgba(255,110,180,.07);border:1.5px dashed rgba(255,110,180,.25);border-radius:8px;color:var(--a1);font-size:11px;padding:9px;cursor:pointer;transition:all .2s;margin-top:6px;}
.add-btn:hover{background:rgba(255,110,180,.14);}
.gen-btn{width:100%;background:linear-gradient(130deg,#ff6eb4,#a855f7);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:13px;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
.gen-btn:hover{opacity:.88;transform:translateY(-1px);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* RIGHT: Preview */
.preview-area{padding:24px;overflow-y:auto;display:flex;flex-direction:column;align-items:center;gap:16px;}
.preview-top{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.pbtn{background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--mu);font-size:11px;padding:8px 14px;cursor:pointer;transition:all .15s;}
.pbtn:hover{border-color:var(--a1);color:var(--a1);}
.pbtn.g{background:rgba(74,239,192,.1);border-color:rgba(74,239,192,.3);color:#4aefc0;}
.empty-state{text-align:center;padding:80px 20px;color:var(--mu);}
.empty-state .ico{font-size:52px;margin-bottom:16px;opacity:.25;}
.empty-state p{font-size:13px;line-height:1.8;}

/* ── BANNER STYLES ── */
.banner-outer{position:relative;display:inline-block;}

/* Pink theme */
.theme-pink{
  --tc1:#ff6eb4;--tc2:#e879f9;--tc3:#fce7f3;--tc4:#fdf2f8;
  --tbg:#fff0f7;--tcard:#ffffff;--ttitle:#be185d;--ttext:#831843;--tsub:#9d174d;
  --tborder:#fce7f3;--tprice-bg:#ff6eb4;--tprice-text:#fff;
  --tdeco1:#f9a8d4;--tdeco2:#fbbf24;
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
}
/* Yellow theme */
.theme-yellow{
  --tc1:#f59e0b;--tc2:#ef4444;--tc3:#fef3c7;--tc4:#fffbeb;
  --tbg:#fffdf5;--tcard:#ffffff;--ttitle:#b45309;--ttext:#78350f;--tsub:#92400e;
  --tborder:#fde68a;--tprice-bg:#f59e0b;--tprice-text:#fff;
  --tdeco1:#fbbf24;--tdeco2:#f43f5e;
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
}
/* Green theme */
.theme-green{
  --tc1:#16a34a;--tc2:#0d9488;--tc3:#dcfce7;--tc4:#f0fdf4;
  --tbg:#f5fff8;--tcard:#ffffff;--ttitle:#15803d;--ttext:#14532d;--tsub:#166534;
  --tborder:#bbf7d0;--tprice-bg:#16a34a;--tprice-text:#fff;
  --tdeco1:#86efac;--tdeco2:#34d399;
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
}
/* Purple theme */
.theme-purple{
  --tc1:#9333ea;--tc2:#ec4899;--tc3:#f3e8ff;--tc4:#faf5ff;
  --tbg:#fdf8ff;--tcard:#ffffff;--ttitle:#7e22ce;--ttext:#4c1d95;--tsub:#5b21b6;
  --tborder:#e9d5ff;--tprice-bg:#9333ea;--tprice-text:#fff;
  --tdeco1:#c4b5fd;--tdeco2:#f0abfc;
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
}
/* Blue theme */
.theme-blue{
  --tc1:#0284c7;--tc2:#6366f1;--tc3:#e0f2fe;--tc4:#f0f9ff;
  --tbg:#f5fbff;--tcard:#ffffff;--ttitle:#0369a1;--ttext:#0c4a6e;--tsub:#075985;
  --tborder:#bae6fd;--tprice-bg:#0284c7;--tprice-text:#fff;
  --tdeco1:#7dd3fc;--tdeco2:#a5b4fc;
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
}
/* Peach theme */
.theme-peach{
  --tc1:#f97316;--tc2:#ec4899;--tc3:#ffedd5;--tc4:#fff7ed;
  --tbg:#fff9f5;--tcard:#ffffff;--ttitle:#c2410c;--ttext:#7c2d12;--tsub:#9a3412;
  --tborder:#fed7aa;--tprice-bg:#f97316;--tprice-text:#fff;
  --tdeco1:#fdba74;--tdeco2:#f9a8d4;
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
}
/* Choco theme */
.theme-choco{
  --tc1:#92400e;--tc2:#d97706;--tc3:#f5ebe0;--tc4:#fdf8f4;
  --tbg:#fdf6ef;--tcard:#ffffff;--ttitle:#78350f;--ttext:#3b1a08;--tsub:#4b2510;
  --tborder:#e7d5c8;--tprice-bg:#92400e;--tprice-text:#fff;
  --tdeco1:#d6b896;--tdeco2:#fbbf24;
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
}
/* Mint theme */
.theme-mint{
  --tc1:#0d9488;--tc2:#6366f1;--tc3:#ccfbf1;--tc4:#f0fdfa;
  --tbg:#f5fffd;--tcard:#ffffff;--ttitle:#0f766e;--ttext:#134e4a;--tsub:#115e59;
  --tborder:#99f6e4;--tprice-bg:#0d9488;--tprice-text:#fff;
  --tdeco1:#5eead4;--tdeco2:#818cf8;
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
}

.banner-wrap{
  background:var(--tbg);
  position:relative;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}

/* Banner decorations */
.banner-deco-top{
  position:absolute;top:0;left:0;right:0;
  height:12px;
  background:repeating-linear-gradient(90deg,var(--tc1) 0,var(--tc1) 8px,var(--tc2) 8px,var(--tc2) 16px);
  opacity:0.7;
}
.banner-deco-bottom{
  position:absolute;bottom:0;left:0;right:0;
  height:12px;
  background:repeating-linear-gradient(90deg,var(--tc2) 0,var(--tc2) 8px,var(--tc1) 8px,var(--tc1) 16px);
  opacity:0.7;
}
.banner-deco-left{
  position:absolute;top:12px;left:0;bottom:12px;width:10px;
  background:linear-gradient(180deg,var(--tc1),var(--tc2));opacity:0.5;
}
.banner-deco-right{
  position:absolute;top:12px;right:0;bottom:12px;width:10px;
  background:linear-gradient(180deg,var(--tc2),var(--tc1));opacity:0.5;
}

/* Dot pattern overlay */
.banner-dots{
  position:absolute;inset:0;
  background-image:radial-gradient(circle,var(--tdeco1) 1.5px,transparent 1.5px);
  background-size:24px 24px;
  opacity:0.18;
  pointer-events:none;
}

/* Banner header */
.banner-header{
  position:relative;
  text-align:center;
  padding:28px 24px 20px;
  z-index:1;
}
.banner-sub-badge{
  display:inline-block;
  background:var(--tc1);
  color:#fff;
  font-size:13px;
  font-weight:700;
  padding:5px 18px;
  border-radius:999px;
  margin-bottom:12px;
  letter-spacing:0.5px;
}
.banner-title{
  font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
  font-weight:900;
  line-height:1.15;
  letter-spacing:-1px;
  background:linear-gradient(135deg,var(--tc1),var(--tc2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.08));
}
.banner-title-outline{
  position:relative;
}
.banner-title-outline::after{
  content:attr(data-text);
  position:absolute;
  left:0;right:0;top:0;
  background:none;
  -webkit-text-fill-color:transparent;
  -webkit-text-stroke:3px rgba(255,255,255,0.6);
  z-index:-1;
}
.banner-divider{
  display:flex;align-items:center;gap:10px;
  margin:12px auto 0;width:80%;
}
.banner-divider-line{height:2px;flex:1;background:linear-gradient(90deg,transparent,var(--tc1),transparent);}
.banner-divider-icon{font-size:14px;color:var(--tc1);}

/* Product grid */
.banner-grid{
  padding:0 18px 20px;
  position:relative;z-index:1;
}
.banner-grid.cols-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.banner-grid.cols-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.banner-grid.cols-1{display:grid;grid-template-columns:1fr;gap:10px;}

/* Product card */
.pcard{
  background:var(--tcard);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.08),0 0 0 1.5px var(--tborder);
  transition:transform .2s;
  position:relative;
}
.pcard-img-wrap{
  background:var(--tc4);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
}
.pcard-img-wrap img{
  width:100%;height:100%;
  object-fit:contain;
  padding:8px;
}
.pcard-img-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;opacity:0.4;
}
.pcard-body{
  padding:10px 10px 12px;
}
.pcard-brand{
  font-size:10px;font-weight:700;
  color:var(--tc1);
  margin-bottom:3px;
  letter-spacing:0.3px;
}
.pcard-name{
  font-size:11px;font-weight:700;
  color:var(--ttext);
  line-height:1.4;
  margin-bottom:4px;
}
.pcard-desc{
  font-size:10px;font-weight:400;
  color:var(--tsub);
  line-height:1.4;
  margin-bottom:6px;
}
.pcard-price{
  display:inline-block;
  background:var(--tprice-bg);
  color:var(--tprice-text);
  font-size:11px;font-weight:700;
  padding:3px 10px;
  border-radius:999px;
  letter-spacing:0.3px;
}
/* Corner ribbon */
.pcard-ribbon{
  position:absolute;top:8px;left:8px;
  background:var(--tc2);
  color:#fff;
  font-size:9px;font-weight:700;
  padding:2px 8px;
  border-radius:999px;
  letter-spacing:0.3px;
  z-index:2;
}

/* Banner footer */
.banner-footer{
  text-align:center;
  padding:12px 20px 24px;
  position:relative;z-index:1;
}
.banner-footer-text{
  font-size:11px;font-weight:500;
  color:var(--tsub);
  opacity:0.7;
}
.banner-hashtags{
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
  margin-top:8px;
}
.banner-hashtag{
  font-size:10px;font-weight:600;
  color:var(--tc1);
  opacity:0.8;
}

/* Floating deco */
.fdeco{
  position:absolute;
  pointer-events:none;
  font-size:16px;
  opacity:0.3;
  z-index:0;
}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">BannerAI</div>
    <div class="tagline">LIPSレベルの商品まとめバナーを秒で作成</div>

    <div class="section">
      <div class="sec-label">バナー設定</div>
      <div class="fg">
        <label>タイトル *</label>
        <input type="text" id="bannerTitle" placeholder="例：垢抜け眉毛メイクおすすめ10選" oninput="liveUpdate()">
      </div>
      <div class="fg">
        <label>サブテキスト</label>
        <input type="text" id="bannerSub" placeholder="例：ブルベ向け・プチプラ" oninput="liveUpdate()">
      </div>
      <div class="fg">
        <label>サイズ</label>
        <div class="chips" id="sc">
          <div class="chip on" data-w="1080" data-h="1350">Instagram縦</div>
          <div class="chip" data-w="1080" data-h="1080">正方形</div>
          <div class="chip" data-w="1080" data-h="1920">ストーリー</div>
          <div class="chip" data-w="1200" data-h="628">OGP横長</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">テーマ</div>
      <div class="theme-row" id="themeGrid">
        <div class="tbtn on" data-t="pink" style="background:linear-gradient(135deg,#ffb7d5,#e879f9);color:#fff">ピンク<br><span style="font-size:7px;opacity:.8">フェミニン</span></div>
        <div class="tbtn" data-t="yellow" style="background:linear-gradient(135deg,#fde68a,#fb923c);color:#78350f">イエロー<br><span style="font-size:7px;opacity:.8">ナチュラル</span></div>
        <div class="tbtn" data-t="green" style="background:linear-gradient(135deg,#a7f3d0,#34d399);color:#064e3b">グリーン<br><span style="font-size:7px;opacity:.8">清楚</span></div>
        <div class="tbtn" data-t="purple" style="background:linear-gradient(135deg,#c4b5fd,#8b5cf6);color:#fff">パープル<br><span style="font-size:7px;opacity:.8">上品</span></div>
        <div class="tbtn" data-t="blue" style="background:linear-gradient(135deg,#bae6fd,#38bdf8);color:#0c4a6e">ブルー<br><span style="font-size:7px;opacity:.8">クール</span></div>
        <div class="tbtn" data-t="peach" style="background:linear-gradient(135deg,#fed7aa,#fb923c);color:#7c2d12">ピーチ<br><span style="font-size:7px;opacity:.8">ポップ</span></div>
        <div class="tbtn" data-t="choco" style="background:linear-gradient(135deg,#d6b896,#92400e);color:#fff">ショコラ<br><span style="font-size:7px;opacity:.8">高級感</span></div>
        <div class="tbtn" data-t="mint" style="background:linear-gradient(135deg,#ccfbf1,#2dd4bf);color:#134e4a">ミント<br><span style="font-size:7px;opacity:.8">さわやか</span></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">レイアウト</div>
      <div class="chips" id="lc">
        <div class="chip on" data-l="cols-3">3列</div>
        <div class="chip" data-l="cols-2">2列</div>
        <div class="chip" data-l="cols-1">1列</div>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">商品を追加（制限なし）</div>
      <div class="prod-list" id="prodList"></div>
      <button class="add-btn" onclick="addProd()">＋ 商品を追加する</button>
    </div>

    <div class="section">
      <button class="gen-btn" id="genBtn" onclick="generate()">
        <span id="bt">✦ AIでバナーを生成する</span>
        <div class="spinner" id="sp"></div>
      </button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-area" id="previewArea">
    <div class="empty-state">
      <div class="ico">🎨</div>
      <p>左のフォームを入力して<br>「バナーを生成する」を押してください<br><br>商品画像・ブランド名・価格を入れるだけで<br>LIPSレベルのバナーが完成します</p>
    </div>
  </div>
</div>

<script>
let products=[];
let selTheme='pink';
let selLayout='cols-3';
let bw=1080,bh=1350;
let aiData=null;
let liveTimer=null;

// Init
for(let i=0;i<3;i++)addProd();

// Size chips
document.querySelectorAll('#sc .chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('#sc .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');bw=+c.dataset.w;bh=+c.dataset.h;
}));

// Layout chips
document.querySelectorAll('#lc .chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('#lc .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');selLayout=c.dataset.l;
  if(document.getElementById('bannerEl'))updateBannerStyle();
}));

// Theme buttons
document.querySelectorAll('.tbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');selTheme=b.dataset.t;
  if(document.getElementById('bannerEl'))updateBannerStyle();
}));

function addProd(){
  const id='p'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  products.push({id,img:null,brand:'',name:'',price:'',desc:''});
  renderProdList();
}

function delProd(id){
  products=products.filter(p=>p.id!==id);
  renderProdList();
  if(document.getElementById('bannerEl'))renderBannerProducts();
}

function renderProdList(){
  const list=document.getElementById('prodList');
  list.innerHTML='';
  products.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='pitem';
    div.innerHTML=`
      <div class="pitem-top">
        <div class="pimg-ph" id="ph_${p.id}">
          ${p.img?`<img src="${p.img}" class="pimg" style="width:52px;height:52px;">`:`<span>📷</span>`}
          <input type="file" accept="image/*" onchange="onProdImg(event,'${p.id}')">
        </div>
        <div class="pfields">
          <input type="text" placeholder="ブランド名" value="${p.brand}" oninput="upd('${p.id}','brand',this.value)">
          <input type="text" placeholder="商品名" value="${p.name}" oninput="upd('${p.id}','name',this.value)">
          <input type="text" placeholder="価格（例：858円）" value="${p.price}" oninput="upd('${p.id}','price',this.value)">
        </div>
        <button class="pdel" onclick="delProd('${p.id}')">✕</button>
      </div>
      <input type="text" placeholder="説明文（任意）" value="${p.desc}" oninput="upd('${p.id}','desc',this.value)" style="font-size:10px;margin-top:4px;">
    `;
    list.appendChild(div);
  });
}

function upd(id,f,v){
  const p=products.find(x=>x.id===id);
  if(p){p[f]=v;if(document.getElementById('bannerEl'))scheduleLiveUpdate();}
}

function onProdImg(e,id){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const p=products.find(x=>x.id===id);
    if(p){p.img=ev.target.result;renderProdList();if(document.getElementById('bannerEl'))renderBannerProducts();}
  };
  r.readAsDataURL(f);
}

function scheduleLiveUpdate(){
  clearTimeout(liveTimer);
  liveTimer=setTimeout(()=>{if(document.getElementById('bannerEl'))renderBannerProducts();},300);
}

function liveUpdate(){
  if(document.getElementById('bannerEl')){
    scheduleLiveUpdate();
    document.querySelector('.banner-title').textContent=document.getElementById('bannerTitle').value||'タイトル';
    document.querySelector('.banner-title').setAttribute('data-text',document.getElementById('bannerTitle').value||'タイトル');
    const subEl=document.querySelector('.banner-sub-badge');
    if(subEl){const sv=document.getElementById('bannerSub').value;subEl.textContent=sv||'';subEl.style.display=sv?'inline-block':'none';}
  }
}

async function generate(){
  const title=document.getElementById('bannerTitle').value.trim();
  if(!title){alert('タイトルを入力してください');return;}

  const btn=document.getElementById('genBtn');
  btn.disabled=true;
  document.getElementById('bt').style.display='none';
  document.getElementById('sp').style.display='block';

  // AIでキャッチコピー等を生成
  const validProds=products.filter(p=>p.name||p.brand);
  const prompt=`以下の商品まとめバナーのコンテンツを提案してください。

タイトル: ${title}
商品数: ${validProds.length}
テーマ: ${selTheme}

JSONのみ出力:
{"tagline":"タイトルを補完するキャッチコピー15文字以内","footer":"フッターメッセージ20文字以内","hashtags":["#タグ1","#タグ2","#タグ3"]}`;

  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const data=await res.json();
    if(!data.error){
      const match=(data.text||'').match(/\{[\s\S]*\}/);
      if(match)aiData=JSON.parse(match[0].replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,''));
    }
  }catch(e){console.warn('AI fallback',e);aiData=null;}

  renderBanner();
  btn.disabled=false;
  document.getElementById('bt').style.display='block';
  document.getElementById('sp').style.display='none';
}

function renderBanner(){
  const title=document.getElementById('bannerTitle').value.trim()||'タイトル';
  const sub=document.getElementById('bannerSub').value.trim();
  const area=document.getElementById('previewArea');

  // スケール計算
  const maxPreviewW=Math.min(window.innerWidth-420,700);
  const scale=maxPreviewW/bw;
  const dw=Math.round(bw*scale);
  const dh=Math.round(bh*scale);

  const titleSize=Math.round(bw*(title.length>12?0.07:0.085));
  const colsNum=selLayout==='cols-3'?3:selLayout==='cols-2'?2:1;
  const imgH=Math.round(bw/colsNum*(selLayout==='cols-1'?0.4:0.65));

  area.innerHTML=`
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;">
      <button class="pbtn g" onclick="saveJPG()">⬇ JPGで保存</button>
      <button class="pbtn" onclick="generate()">🔄 AI再生成</button>
    </div>
    <div style="transform:scale(${scale.toFixed(3)});transform-origin:top center;display:inline-block;margin-bottom:${Math.round(dh*(scale-1))}px">
      <div class="banner-wrap theme-${selTheme}" id="bannerEl" style="width:${bw}px;">
        <div class="banner-deco-top"></div>
        <div class="banner-deco-bottom"></div>
        <div class="banner-deco-left"></div>
        <div class="banner-deco-right"></div>
        <div class="banner-dots"></div>

        <!-- Floating decos -->
        <div class="fdeco" style="top:5%;left:4%">✿</div>
        <div class="fdeco" style="top:3%;right:5%">★</div>
        <div class="fdeco" style="top:8%;left:88%">♡</div>
        <div class="fdeco" style="top:92%;left:3%">✦</div>
        <div class="fdeco" style="top:94%;right:4%">✿</div>
        <div class="fdeco" style="top:48%;left:2%">♪</div>
        <div class="fdeco" style="top:55%;right:2%">◎</div>

        <div class="banner-header">
          <div class="banner-sub-badge" style="${sub?'':'display:none'}">${sub}</div>
          <div class="banner-title banner-title-outline" data-text="${title}" style="font-size:${titleSize}px">${title}</div>
          <div class="banner-divider">
            <div class="banner-divider-line"></div>
            <div class="banner-divider-icon">✦</div>
            <div class="banner-divider-line"></div>
          </div>
        </div>

        <div class="banner-grid ${selLayout}" id="prodGrid"></div>

        <div class="banner-footer">
          <div class="banner-footer-text">${aiData?.footer||'※価格は掲載時点のものです'}</div>
          <div class="banner-hashtags" id="hashtagsEl"></div>
        </div>
      </div>
    </div>
  `;

  renderBannerProducts();
  renderHashtags();
  window._bannerEl=document.getElementById('bannerEl');
  window._bannerScale=scale;
}

function renderBannerProducts(){
  const grid=document.getElementById('prodGrid');
  if(!grid)return;
  const colsNum=selLayout==='cols-3'?3:selLayout==='cols-2'?2:1;
  const imgH=Math.round(bw/colsNum*(selLayout==='cols-1'?0.35:selLayout==='cols-2'?0.7:0.75));
  const validProds=products.filter(p=>p.name||p.brand||p.img);
  if(validProds.length===0){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:#ccc;font-size:14px;">商品を追加してください</div>`;return;}
  grid.innerHTML=validProds.map((p,i)=>`
    <div class="pcard">
      ${i<3?`<div class="pcard-ribbon">おすすめ</div>`:''}
      <div class="pcard-img-wrap" style="height:${imgH}px">
        ${p.img?`<img src="${p.img}" alt="${p.name}">`:`<div class="pcard-img-placeholder">📷</div>`}
      </div>
      <div class="pcard-body">
        ${p.brand?`<div class="pcard-brand">${p.brand}</div>`:''}
        ${p.name?`<div class="pcard-name">${p.name}</div>`:''}
        ${p.desc?`<div class="pcard-desc">${p.desc}</div>`:''}
        ${p.price?`<div class="pcard-price">${p.price}</div>`:''}
      </div>
    </div>
  `).join('');
}

function renderHashtags(){
  const el=document.getElementById('hashtagsEl');
  if(!el)return;
  const tags=aiData?.hashtags||['#コスメ','#メイク','#プチプラ'];
  el.innerHTML=tags.map(t=>`<span class="banner-hashtag">${t}</span>`).join('');
}

function updateBannerStyle(){
  const el=document.getElementById('bannerEl');
  if(!el)return;
  el.className=`banner-wrap theme-${selTheme}`;
  const grid=document.getElementById('prodGrid');
  if(grid){grid.className=`banner-grid ${selLayout}`;renderBannerProducts();}
}

async function saveJPG(){
  const el=window._bannerEl;
  if(!el){alert('まずバナーを生成してください');return;}
  try{
    const canvas=await html2canvas(el,{
      scale:2,useCORS:true,allowTaint:true,
      backgroundColor:null,
      width:bw,height:el.offsetHeight,
      logging:false
    });
    const a=document.createElement('a');
    const title=document.getElementById('bannerTitle').value.trim()||'banner';
    a.download=`banner_${title.slice(0,10)}_${Date.now()}.jpg`;
    a.href=canvas.toDataURL('image/jpeg',.95);
    a.click();
  }catch(e){
    alert('保存に失敗しました。もう一度試してください。');
    console.error(e);
  }
}
</script>
</body>
</html>
