<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignBrief AI — デザイン方向性を瞬時に決める</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07060f;--s1:#0f0e1e;--s2:#16152a;--s3:#1e1c38;
  --a1:#7c6aff;--a2:#ff6a8a;--a3:#ffd93d;--a4:#4aefc0;
  --tx:#f0f0fa;--mu:#7070a0;--bd:#22203a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 50% 40% at 20% 20%,rgba(124,106,255,.1) 0%,transparent 60%),
  radial-gradient(ellipse 40% 30% at 80% 80%,rgba(255,106,138,.07) 0%,transparent 60%);
  pointer-events:none;z-index:0;}

.wrap{max-width:1080px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}

header{padding:32px 0 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  background:linear-gradient(130deg,var(--a1),var(--a2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo span{font-size:10px;font-weight:400;color:var(--mu);margin-left:8px;-webkit-text-fill-color:var(--mu);}

.hero{margin-bottom:32px;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,40px);font-weight:800;
  line-height:1.1;letter-spacing:-1.5px;margin-bottom:8px;}
.hero h1 em{font-style:normal;
  background:linear-gradient(130deg,var(--a1),var(--a2),var(--a3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{color:var(--mu);font-size:13px;line-height:1.7;}

.layout{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start;}
@media(max-width:800px){.layout{grid-template-columns:1fr;}}

/* FORM */
.form-panel{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:22px;}
.sec{margin-bottom:16px;}
.sl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sl::after{content:'';flex:1;height:1px;background:var(--bd);}
.fg{margin-bottom:10px;}
label{display:block;font-size:10px;font-weight:600;color:var(--mu);margin-bottom:4px;}
label .req{color:var(--a2);}
input[type=text],textarea,select{
  width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;
  color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:12px;
  padding:8px 11px;outline:none;transition:border-color .2s;}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--a1);}
textarea{resize:vertical;min-height:72px;}
select option{background:var(--s2);}

.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{background:var(--s2);border:1px solid var(--bd);border-radius:6px;
  color:var(--mu);font-size:10px;font-weight:500;padding:4px 9px;
  cursor:pointer;transition:all .15s;user-select:none;}
.chip:hover,.chip.on{background:rgba(124,106,255,.15);border-color:var(--a1);color:var(--a1);}

.gen-btn{width:100%;background:linear-gradient(130deg,var(--a1),var(--a2));
  border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;padding:13px;cursor:pointer;
  transition:opacity .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:4px;}
.gen-btn:hover{opacity:.88;transform:translateY(-1px);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* OUTPUT */
.output{display:flex;flex-direction:column;gap:16px;}
.empty-state{background:var(--s1);border:1px solid var(--bd);border-radius:16px;
  padding:48px 24px;text-align:center;color:var(--mu);}
.empty-state .ico{font-size:44px;margin-bottom:12px;opacity:.3;}
.empty-state p{font-size:12px;line-height:1.8;}

/* BRIEF CARD */
.brief-header{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:20px;}
.brief-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  color:var(--a1);letter-spacing:1px;margin-bottom:4px;}
.brief-project{font-size:18px;font-weight:700;margin-bottom:6px;}
.brief-meta{font-size:11px;color:var(--mu);line-height:1.6;}

/* COLOR PALETTES */
.palettes-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:20px;}
.pw-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);margin-bottom:14px;}
.palettes{display:flex;flex-direction:column;gap:12px;}
.palette{background:var(--s2);border:1px solid var(--bd);border-radius:10px;
  padding:14px;cursor:pointer;transition:all .2s;position:relative;}
.palette:hover{border-color:var(--a1);}
.palette.selected{border-color:var(--a1);background:rgba(124,106,255,.08);}
.palette-num{font-size:9px;font-weight:700;color:var(--a1);letter-spacing:1.5px;margin-bottom:6px;}
.palette-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.palette-concept{font-size:10px;color:var(--mu);margin-bottom:10px;line-height:1.5;}
.colors{display:flex;gap:6px;margin-bottom:10px;align-items:center;}
.color-swatch{width:36px;height:36px;border-radius:8px;border:2px solid rgba(255,255,255,.1);
  flex-shrink:0;position:relative;}
.color-swatch:hover::after{content:attr(data-hex);position:absolute;
  bottom:-22px;left:50%;transform:translateX(-50%);
  background:var(--s3);color:var(--tx);font-size:9px;padding:2px 6px;
  border-radius:4px;white-space:nowrap;z-index:10;}
.color-codes{font-size:9px;color:var(--mu);display:flex;gap:8px;flex-wrap:wrap;}
.palette-detail{font-size:10px;color:var(--tx);opacity:.8;line-height:1.6;}
.palette-detail strong{color:var(--a3);}

/* FONT & LAYOUT */
.design-specs{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.spec-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;}
.spec-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);margin-bottom:10px;}
.spec-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.spec-icon{font-size:13px;flex-shrink:0;}
.spec-text{font-size:11px;color:var(--tx);line-height:1.6;opacity:.88;}
.spec-text strong{color:var(--a4);}

/* COPY BUTTON */
.copy-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:8px;}
.copy-btn{background:var(--s2);border:1px solid var(--bd);border-radius:7px;
  color:var(--mu);font-size:10px;padding:6px 12px;cursor:pointer;transition:all .15s;}
.copy-btn:hover{border-color:var(--a1);color:var(--a1);}
.copy-btn.g{background:rgba(74,239,192,.1);border-color:rgba(74,239,192,.3);color:var(--a4);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeUp .35s ease forwards;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="logo">DesignBrief AI <span>powered by Claude</span></div>
    </div>
  </header>

  <div class="hero">
    <h1>案件情報を入れるだけで<br><em>デザインの方向性が決まる。</em></h1>
    <p>配色・フォント・レイアウト方針をAIが瞬時に提案。Illustratorで作り始める前の「迷い時間」をゼロにする。</p>
  </div>

  <div class="layout">
    <!-- フォーム -->
    <div class="form-panel">
      <div class="sec">
        <div class="sl">案件情報</div>
        <div class="fg">
          <label>案件名・制作物<span class="req">*</span></label>
          <input type="text" id="project" placeholder="例：夏の新作コスメ紹介バナー、イベント告知画像">
        </div>
        <div class="fg">
          <label>ターゲット層</label>
          <input type="text" id="target" placeholder="例：20代女性、ファミリー層、ビジネスマン">
        </div>
        <div class="fg">
          <label>媒体・サイズ</label>
          <div class="chips" id="mediaChips">
            <div class="chip on" data-v="Instagram正方形(1080×1080)">Instagram正方形</div>
            <div class="chip" data-v="Instagramストーリー(1080×1920)">ストーリー</div>
            <div class="chip" data-v="TwitterバナーOGP(1200×628)">TwitterOGP</div>
            <div class="chip" data-v="Webバナー横長(728×90)">Web横長バナー</div>
            <div class="chip" data-v="LPヘッダー(1920×600)">LPヘッダー</div>
            <div class="chip" data-v="自由">その他</div>
          </div>
        </div>
      </div>

      <div class="sec">
        <div class="sl">デザイン要件</div>
        <div class="fg">
          <label>雰囲気・トーン</label>
          <div class="chips" id="toneChips">
            <div class="chip on" data-v="かわいい・ポップ">かわいい・ポップ</div>
            <div class="chip" data-v="おしゃれ・高級感">おしゃれ・高級感</div>
            <div class="chip" data-v="クール・スタイリッシュ">クール</div>
            <div class="chip" data-v="ナチュラル・やわらか">ナチュラル</div>
            <div class="chip" data-v="信頼感・誠実">信頼感</div>
            <div class="chip" data-v="インパクト重視">インパクト</div>
            <div class="chip" data-v="シンプル・ミニマル">ミニマル</div>
          </div>
        </div>
        <div class="fg">
          <label>使用カラー（ブランドカラーなど・任意）</label>
          <input type="text" id="brandColor" placeholder="例：ネイビー・ゴールド、#FF6EB4">
        </div>
        <div class="fg">
          <label>その他要望・制約</label>
          <textarea id="notes" placeholder="例：既存のバナーと統一感を出したい、文字多め、写真は使わない"></textarea>
        </div>
      </div>

      <button class="gen-btn" id="genBtn">
        <span id="bt">✦ デザイン方向性を生成する</span>
        <div class="spin" id="sp"></div>
      </button>
    </div>

    <!-- 出力 -->
    <div class="output" id="output">
      <div class="empty-state">
        <div class="ico">✏️</div>
        <p>案件情報を入力して<br>「デザイン方向性を生成する」を押してください<br><br>
        <span style="color:var(--a4);font-size:11px">✦ 配色3パターン・フォント方針・<br>レイアウト構成案を瞬時に提案</span></p>
      </div>
    </div>
  </div>
</div>

<script>
// チップ選択
document.querySelectorAll('#mediaChips .chip').forEach(function(c){
  c.addEventListener('click', function(){
    document.querySelectorAll('#mediaChips .chip').forEach(function(x){x.classList.remove('on');});
    c.classList.add('on');
  });
});
document.querySelectorAll('#toneChips .chip').forEach(function(c){
  c.addEventListener('click', function(){
    document.querySelectorAll('#toneChips .chip').forEach(function(x){x.classList.remove('on');});
    c.classList.add('on');
  });
});

document.getElementById('genBtn').addEventListener('click', generate);

async function generate(){
  var project = document.getElementById('project').value.trim();
  if(!project){alert('案件名・制作物を入力してください');return;}

  var target = document.getElementById('target').value.trim();
  var media = (document.querySelector('#mediaChips .chip.on') || {}).dataset.v || 'Instagram正方形';
  var tone = (document.querySelector('#toneChips .chip.on') || {}).dataset.v || 'かわいい・ポップ';
  var brandColor = document.getElementById('brandColor').value.trim();
  var notes = document.getElementById('notes').value.trim();

  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('bt').style.display = 'none';
  document.getElementById('sp').style.display = 'block';

  var prompt = 'あなたはプロのグラフィックデザイナーです。以下の案件のデザイン方向性を提案してください。\n\n'
    + '案件: ' + project + '\n'
    + 'ターゲット: ' + (target||'未指定') + '\n'
    + '媒体: ' + media + '\n'
    + 'トーン: ' + tone + '\n'
    + (brandColor ? 'ブランドカラー: ' + brandColor + '\n' : '')
    + (notes ? '要望: ' + notes + '\n' : '')
    + '\nJSONのみ出力（説明文不要）:\n'
    + '{"overview":"案件概要と方向性まとめ40文字以内","palettes":[{"name":"配色名10文字","concept":"コンセプト30文字","colors":["#hex1","#hex2","#hex3","#hex4"],"color_names":["色名1","色名2","色名3","色名4"],"font_main":"メインフォント方向性","font_sub":"サブフォント方向性","layout":"レイアウト方針40文字","mood":"この配色で伝わる印象20文字"},{"name":"配色名10文字","concept":"コンセプト30文字","colors":["#hex1","#hex2","#hex3","#hex4"],"color_names":["色名1","色名2","色名3","色名4"],"font_main":"メインフォント方向性","font_sub":"サブフォント方向性","layout":"レイアウト方針40文字","mood":"この配色で伝わる印象20文字"},{"name":"配色名10文字","concept":"コンセプト30文字","colors":["#hex1","#hex2","#hex3","#hex4"],"color_names":["色名1","色名2","色名3","色名4"],"font_main":"メインフォント方向性","font_sub":"サブフォント方向性","layout":"レイアウト方針40文字","mood":"この配色で伝わる印象20文字"}],"dos":["やるべきこと1","やるべきこと2","やるべきこと3"],"donts":["避けるべきこと1","避けるべきこと2"],"reference":"参考にすべきデザインの方向性30文字"}';

  try{
    var res = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:prompt})
    });
    var d = await res.json();
    if(d.error) throw new Error(d.error);

    var text = d.text || '';
    var m = text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('JSON not found');
    var data = JSON.parse(m[0]);
    renderOutput(project, target, media, tone, data);
  }catch(e){
    console.error(e);
    alert('生成に失敗しました: ' + e.message);
  }finally{
    btn.disabled = false;
    document.getElementById('bt').style.display = 'block';
    document.getElementById('sp').style.display = 'none';
  }
}

function renderOutput(project, target, media, tone, data){
  var out = document.getElementById('output');
  var html = '';

  // ヘッダー
  html += '<div class="brief-header fade">'
    + '<div class="brief-title">✦ デザインブリーフ</div>'
    + '<div class="brief-project">' + esc(project) + '</div>'
    + '<div class="brief-meta">'
    + (target ? 'ターゲット：' + esc(target) + '　' : '')
    + '媒体：' + esc(media) + '　トーン：' + esc(tone)
    + '</div>'
    + (data.overview ? '<div style="margin-top:8px;font-size:11px;color:var(--a4);line-height:1.6">' + esc(data.overview) + '</div>' : '')
    + '<div class="copy-bar"><button class="copy-btn g" onclick="copyBrief()">📋 ブリーフ全体をコピー</button></div>'
    + '</div>';

  // 配色パターン
  html += '<div class="palettes-wrap fade" style="animation-delay:.08s">'
    + '<div class="pw-title">配色パターン（3案）</div>'
    + '<div class="palettes" id="paletteList">';

  (data.palettes || []).forEach(function(p, i){
    html += '<div class="palette' + (i===0?' selected':'') + '" onclick="selectPalette(this)">'
      + '<div class="palette-num">PATTERN ' + (i+1) + '</div>'
      + '<div class="palette-name">' + esc(p.name||'') + '</div>'
      + '<div class="palette-concept">' + esc(p.concept||'') + '</div>'
      + '<div class="colors">';
    (p.colors||[]).forEach(function(c, ci){
      html += '<div class="color-swatch" style="background:' + esc(c) + '" data-hex="' + esc(c) + '" title="' + esc((p.color_names||[])[ci]||c) + '"></div>';
    });
    html += '</div>'
      + '<div class="color-codes">';
    (p.colors||[]).forEach(function(c, ci){
      html += '<span onclick="copyText(\'' + esc(c) + '\')" style="cursor:pointer;text-decoration:underline dotted" title="クリックでコピー">' + esc(c) + '</span>';
    });
    html += '</div>'
      + '<div class="palette-detail" style="margin-top:8px">'
      + '<strong>フォント：</strong>' + esc(p.font_main||'') + ' × ' + esc(p.font_sub||'') + '<br>'
      + '<strong>レイアウト：</strong>' + esc(p.layout||'') + '<br>'
      + '<strong>伝わる印象：</strong>' + esc(p.mood||'')
      + '</div>'
      + '</div>';
  });

  html += '</div></div>';

  // DO/DON'T
  html += '<div class="design-specs fade" style="animation-delay:.16s">'
    + '<div class="spec-card">'
    + '<div class="spec-title">✅ やるべきこと</div>';
  (data.dos||[]).forEach(function(d){
    html += '<div class="spec-item"><div class="spec-icon">→</div><div class="spec-text">' + esc(d) + '</div></div>';
  });
  html += '</div><div class="spec-card">'
    + '<div class="spec-title">❌ 避けるべきこと</div>';
  (data.donts||[]).forEach(function(d){
    html += '<div class="spec-item"><div class="spec-icon">✕</div><div class="spec-text">' + esc(d) + '</div></div>';
  });
  if(data.reference){
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)">'
      + '<div class="spec-title">🎨 参考デザインの方向性</div>'
      + '<div class="spec-text">' + esc(data.reference) + '</div>'
      + '</div>';
  }
  html += '</div></div>';

  out.innerHTML = html;
  window._briefData = {project, target, media, tone, data};
}

function selectPalette(el){
  document.querySelectorAll('.palette').forEach(function(p){p.classList.remove('selected');});
  el.classList.add('selected');
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyText(text){
  navigator.clipboard.writeText(text).then(function(){
    // 一瞬フラッシュ
  });
}

function copyBrief(){
  var d = window._briefData;
  if(!d) return;
  var txt = '【デザインブリーフ】\n';
  txt += '案件：' + d.project + '\n';
  if(d.target) txt += 'ターゲット：' + d.target + '\n';
  txt += '媒体：' + d.media + '\n';
  txt += 'トーン：' + d.tone + '\n\n';
  if(d.data.overview) txt += '方向性：' + d.data.overview + '\n\n';
  (d.data.palettes||[]).forEach(function(p,i){
    txt += '【配色案' + (i+1) + '：' + p.name + '】\n';
    txt += 'コンセプト：' + p.concept + '\n';
    txt += 'カラー：' + (p.colors||[]).join(' / ') + '\n';
    txt += 'フォント：' + p.font_main + ' × ' + p.font_sub + '\n';
    txt += 'レイアウト：' + p.layout + '\n';
    txt += '印象：' + p.mood + '\n\n';
  });
  if(d.data.dos) txt += 'やるべきこと：\n' + d.data.dos.map(function(x){return '・'+x;}).join('\n') + '\n\n';
  if(d.data.donts) txt += '避けるべきこと：\n' + d.data.donts.map(function(x){return '・'+x;}).join('\n') + '\n\n';
  if(d.data.reference) txt += '参考方向性：' + d.data.reference + '\n';
  navigator.clipboard.writeText(txt).then(function(){alert('ブリーフをコピーしました！');});
}
</script>
</body>
</html>
