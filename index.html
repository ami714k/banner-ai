<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignBrief AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07060f;--s1:#0f0e1e;--s2:#16152a;--s3:#1e1c38;--a1:#7c6aff;--a2:#ff6a8a;--a3:#ffd93d;--a4:#4aefc0;--tx:#f0f0fa;--mu:#6060a0;--bd:#22203a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 15%,rgba(124,106,255,.12) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(255,106,138,.08) 0%,transparent 55%);pointer-events:none;z-index:0;}

.wrap{max-width:1100px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}

/* HEADER */
header{padding:28px 0 12px;display:flex;align-items:flex-end;justify-content:space-between;}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(130deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;}
.logo-sub{font-size:10px;color:var(--mu);margin-top:2px;}
.header-badge{background:rgba(124,106,255,.15);border:1px solid rgba(124,106,255,.3);color:var(--a1);font-size:9px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;}

/* HERO */
.hero{padding:20px 0 24px;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,42px);font-weight:800;line-height:1.08;letter-spacing:-2px;margin-bottom:10px;}
.hero h1 em{font-style:normal;background:linear-gradient(130deg,var(--a1),var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{color:var(--mu);font-size:12px;line-height:1.8;max-width:560px;}

/* FORM */
.fcard{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:24px;margin-bottom:24px;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:4px;}
.fg label .req{color:var(--a2);}
input[type=text],select,textarea{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:9px 12px;outline:none;transition:border-color .2s;}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--a1);}
textarea{resize:none;height:58px;}
select option{background:var(--s2);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:620px){.fgrid{grid-template-columns:1fr;}}
.gbtn{width:100%;background:linear-gradient(130deg,var(--a1),var(--a2));border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:14px;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s,transform .1s;}
.gbtn:hover{opacity:.88;transform:translateY(-1px);}
.gbtn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* OUTPUT */
.out{display:flex;flex-direction:column;gap:20px;}
.empty{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:60px 24px;text-align:center;color:var(--mu);}
.empty-ico{font-size:52px;margin-bottom:14px;opacity:.2;}
.empty-txt{font-size:13px;line-height:1.9;}
.empty-hint{margin-top:10px;font-size:11px;color:var(--a4);}

/* IDEA CARDS */
.ideas{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
@media(max-width:860px){.ideas{grid-template-columns:1fr;}}

.icard{background:var(--s1);border:1.5px solid var(--bd);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s,border-color .2s;}
.icard:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.5);border-color:rgba(124,106,255,.3);}

/* Mock banner */
.mock{height:200px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden;}
.mock-deco{position:absolute;font-size:18px;opacity:.18;pointer-events:none;user-select:none;}
.mock-eyebrow{font-size:9px;font-weight:700;padding:3px 12px;border-radius:999px;margin-bottom:9px;letter-spacing:.8px;display:inline-block;}
.mock-title{font-size:20px;font-weight:900;text-align:center;line-height:1.2;margin-bottom:5px;text-shadow:0 2px 10px rgba(0,0,0,.2);}
.mock-sub{font-size:10px;text-align:center;opacity:.65;margin-bottom:12px;}
.mock-colors{display:flex;gap:6px;justify-content:center;}
.mock-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.2);}
.mock-stripe{height:5px;width:100%;position:absolute;bottom:0;}

/* Card body */
.ibody{padding:18px;flex:1;display:flex;flex-direction:column;gap:0;}
.inum{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--a1);margin-bottom:4px;}
.ititle{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.35;}
.idesc{font-size:11px;color:var(--mu);line-height:1.75;margin-bottom:14px;}

/* Color swatches */
.swatches{display:flex;gap:0;border-radius:8px;overflow:hidden;height:36px;margin-bottom:10px;cursor:pointer;}
.sw{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;transition:flex .18s;position:relative;}
.sw:hover{flex:2.2;}
.sw-hex{font-size:8px;font-family:monospace;color:rgba(255,255,255,.8);text-shadow:0 1px 4px rgba(0,0,0,.6);white-space:nowrap;}

/* Tags row */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.tag{font-size:9px;font-weight:600;padding:4px 9px;border-radius:5px;}
.tf{background:rgba(124,106,255,.15);color:var(--a1);}
.tl{background:rgba(255,211,61,.12);color:var(--a3);}
.tm{background:rgba(74,239,192,.12);color:var(--a4);}

/* Illustrator section */
.ai-sec{background:var(--s2);border-radius:10px;padding:12px;margin-bottom:14px;}
.ai-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.ai-label::before{content:'';width:8px;height:8px;border-radius:2px;background:linear-gradient(135deg,#FF9A00,#FF6600);flex-shrink:0;}
.ai-steps{display:flex;flex-direction:column;gap:5px;}
.ai-step{font-size:10px;color:var(--tx);line-height:1.5;display:flex;gap:6px;align-items:flex-start;}
.ai-step-num{font-size:9px;font-weight:700;color:var(--a1);flex-shrink:0;margin-top:1px;}

/* Reference links */
.refs{border-top:1px solid var(--bd);padding-top:14px;margin-top:auto;}
.refs-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:8px;}
.ref-list{display:flex;flex-direction:column;gap:5px;}
.ref-a{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--s3);border:1px solid var(--bd);border-radius:8px;text-decoration:none;transition:all .15s;}
.ref-a:hover{border-color:var(--a1);background:rgba(124,106,255,.1);}
.ref-ico{font-size:15px;flex-shrink:0;}
.ref-info{flex:1;min-width:0;}
.ref-site{font-size:10px;font-weight:700;color:var(--tx);}
.ref-kw{font-size:9px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ref-arr{font-size:11px;color:var(--mu);flex-shrink:0;}

/* Copy all */
.copy-wrap{display:flex;justify-content:flex-end;}
.copy-btn{background:rgba(124,106,255,.12);border:1px solid rgba(124,106,255,.3);border-radius:9px;color:var(--a1);font-size:11px;padding:9px 18px;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;}
.copy-btn:hover{background:rgba(124,106,255,.22);}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--a1);color:#fff;font-size:11px;font-weight:700;padding:8px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:all .25s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fu .32s ease forwards;}
</style>
</head>
<body>
<div class="toast" id="toast">コピーしました！</div>
<div class="wrap">
  <header>
    <div>
      <div class="logo">DesignBrief AI</div>
      <div class="logo-sub">デザインの方向性を、Illustratorを開く前に決める</div>
    </div>
    <div class="header-badge">powered by Claude</div>
  </header>

  <div class="hero">
    <h1>アイデアに詰まったら<br><em>ここから始めよう。</em></h1>
    <p>案件情報を入れるだけで、AIが具体的なデザインアイデア3案・配色・Illustratorでの作り方・参考画像リンクをまとめて提案。<br>迷う時間をゼロにして、すぐ作り始められる。</p>
  </div>

  <div class="fcard">
    <div class="fg">
      <label>案件名・制作物 <span class="req">*</span></label>
      <input type="text" id="project" placeholder="例：夏の新作コスメ紹介バナー、マリノスのイベント告知画像">
    </div>
    <div class="fgrid">
      <div class="fg">
        <label>ターゲット層</label>
        <input type="text" id="target" placeholder="例：20代女性、ファミリー層">
      </div>
      <div class="fg">
        <label>媒体・サイズ</label>
        <select id="media">
          <option>Instagram正方形 1080×1080px</option>
          <option>Instagramストーリー 1080×1920px</option>
          <option>OGP横長 1200×628px</option>
          <option>Webバナー横長 728×90px</option>
          <option>LPヘッダー 1920×600px</option>
        </select>
      </div>
      <div class="fg">
        <label>雰囲気・トーン</label>
        <select id="tone">
          <option>かわいい・ポップ</option>
          <option>おしゃれ・高級感</option>
          <option>クール・スタイリッシュ</option>
          <option>ナチュラル・やわらか</option>
          <option>信頼感・誠実</option>
          <option>インパクト重視</option>
          <option>シンプル・ミニマル</option>
        </select>
      </div>
      <div class="fg">
        <label>ブランドカラー（任意）</label>
        <input type="text" id="bc" placeholder="例：ネイビー×ゴールド、#FF6EB4">
      </div>
    </div>
    <div class="fg">
      <label>その他メモ（任意）</label>
      <textarea id="notes" placeholder="例：既存のバナーと統一感を出したい、文字多め、写真は使わない"></textarea>
    </div>
    <button class="gbtn" id="gbtn">
      <span id="bt">✦ デザインアイデアを生成する</span>
      <div class="spin" id="sp"></div>
    </button>
  </div>

  <div class="out" id="out">
    <div class="empty">
      <div class="empty-ico">💡</div>
      <div class="empty-txt">案件情報を入力して「デザインアイデアを生成する」を押してください</div>
      <div class="empty-hint">✦ アイデア3案 ＋ 配色 ＋ Illustratorの作り方 ＋ 参考リンクを同時生成</div>
    </div>
  </div>
</div>

<script>
var D=null;

function getKey(){
  if(window.CK)return window.CK;
  var k=localStorage.getItem('ck');
  if(k){window.CK=k;return k;}
  k=window.prompt('Claude APIキー（sk-ant-...）を入力してください\n※一度入力すれば次回から不要です');
  if(k){window.CK=k;localStorage.setItem('ck',k);}
  return k||'';
}

document.getElementById('gbtn').addEventListener('click',generate);

async function generate(){
  var project=document.getElementById('project').value.trim();
  if(!project){alert('案件名を入力してください');return;}
  var target=document.getElementById('target').value.trim();
  var media=document.getElementById('media').value;
  var tone=document.getElementById('tone').value;
  var bc=document.getElementById('bc').value.trim();
  var notes=document.getElementById('notes').value.trim();

  var btn=document.getElementById('gbtn');
  btn.disabled=true;
  document.getElementById('bt').style.display='none';
  document.getElementById('sp').style.display='block';
  document.getElementById('out').innerHTML='<div class="empty"><div class="empty-ico" style="opacity:.4">⏳</div><div class="empty-txt">AIがデザインを考えています...<br><span style="font-size:11px;color:var(--a4)">配色・レイアウト・参考リンクを生成中</span></div></div>';

  var prompt='あなたはLIPSやブランドのバナー制作に精通したプロのグラフィックデザイナーです。\n'
    +'以下の案件について、Illustratorですぐ制作に取り掛かれるレベルの具体的なデザインアイデアを3案提案してください。\n\n'
    +'案件：'+project+'\n'
    +'ターゲット：'+(target||'未指定')+'\n'
    +'媒体：'+media+'\n'
    +'トーン：'+tone+'\n'
    +(bc?'ブランドカラー：'+bc+'\n':'')
    +(notes?'その他：'+notes+'\n':'')
    +'\n以下のJSON形式のみ出力（説明文・マークダウン不要）:\n'
    +'{"ideas":['
    +'{"concept":"コンセプト名12文字以内",'
    +'"title":"デザイン方向性タイトル20文字以内",'
    +'"description":"このデザインにした理由と狙い・ターゲットへの訴求方法・全体の印象を60文字以内で具体的に",'
    +'"colors":["#hex1","#hex2","#hex3","#hex4"],'
    +'"cnames":["色名1","色名2","色名3","色名4"],'
    +'"bg_from":"#hex","bg_to":"#hex","accent":"#hex","text_color":"#hex",'
    +'"font":"フォント方向性と理由15文字",'
    +'"layout":"レイアウト構成の説明15文字",'
    +'"mood":"キーワード一言8文字",'
    +'"ai_steps":["Illustratorでの具体的な手順1（例：新規ドキュメントを1080×1080pxで作成し背景をグラデーションで塗る）","手順2（例：テキストをNoto Sans JP Blackで配置しアウトライン化してグラデーション塗りを適用）","手順3（例：装飾要素として楕円ツールで丸を複数配置し不透明度20%に設定）"],'
    +'"pinterest_kw":"Pinterest検索英語キーワード4〜6単語",'
    +'"behance_kw":"Behance検索英語キーワード3〜4単語",'
    +'"google_kw":"Google画像検索日本語キーワード5〜8文字"}'
    +',{"concept":"...","title":"...","description":"...","colors":["#h1","#h2","#h3","#h4"],"cnames":["n1","n2","n3","n4"],"bg_from":"#hex","bg_to":"#hex","accent":"#hex","text_color":"#hex","font":"...","layout":"...","mood":"...","ai_steps":["手順1","手順2","手順3"],"pinterest_kw":"...","behance_kw":"...","google_kw":"..."}'
    +',{"concept":"...","title":"...","description":"...","colors":["#h1","#h2","#h3","#h4"],"cnames":["n1","n2","n3","n4"],"bg_from":"#hex","bg_to":"#hex","accent":"#hex","text_color":"#hex","font":"...","layout":"...","mood":"...","ai_steps":["手順1","手順2","手順3"],"pinterest_kw":"...","behance_kw":"...","google_kw":"..."}'
    +']}';

  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':getKey(),
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{role:'user',content:prompt}]
      })
    });
    var d=await res.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    var text=(d.content&&d.content[0]&&d.content[0].text)||'';
    var m=text.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('JSONが見つかりません');
    D=JSON.parse(m[0]);
    render(project,target);
  }catch(e){
    console.error(e);
    document.getElementById('out').innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">エラー: '+esc(e.message)+'</div></div>';
  }finally{
    btn.disabled=false;
    document.getElementById('bt').style.display='block';
    document.getElementById('sp').style.display='none';
  }
}

function render(project,target){
  var out=document.getElementById('out');
  out.innerHTML='';

  var grid=document.createElement('div');
  grid.className='ideas';

  (D.ideas||[]).forEach(function(idea,i){
    var pq=encodeURIComponent(idea.pinterest_kw||'banner design');
    var bq=encodeURIComponent(idea.behance_kw||'banner design');
    var gq=encodeURIComponent(idea.google_kw||project);

    var card=document.createElement('div');
    card.className='icard fu';
    card.style.animationDelay=(i*.1)+'s';

    // 安全なカラー
    var bgF=idea.bg_from||'#1a1930';
    var bgT=idea.bg_to||'#0f0e1e';
    var acc=idea.accent||'#7c6aff';
    var txc=idea.text_color||'#ffffff';
    var cols=idea.colors||['#7c6aff','#ff6a8a','#ffd93d','#4aefc0'];

    card.innerHTML=
      // Mock banner
      '<div class="mock" style="background:linear-gradient(135deg,'+esc(bgF)+','+esc(bgT)+')">'
      +'<span class="mock-deco" style="top:8%;left:5%">✿</span>'
      +'<span class="mock-deco" style="top:5%;right:7%">★</span>'
      +'<span class="mock-deco" style="bottom:18%;left:4%">♡</span>'
      +'<span class="mock-deco" style="bottom:16%;right:5%">✦</span>'
      +'<span class="mock-deco" style="top:45%;left:2%">◎</span>'
      +'<div class="mock-eyebrow" style="background:'+esc(acc)+';color:#fff">'+esc(idea.concept||'')+'</div>'
      +'<div class="mock-title" style="color:'+esc(txc)+'">'+(project.slice(0,14)||'タイトル')+'</div>'
      +'<div class="mock-sub" style="color:'+esc(txc)+'">'+(target||idea.mood||'ターゲット')+'</div>'
      +'<div class="mock-colors">'+cols.map(function(c){return '<div class="mock-dot" style="background:'+esc(c)+'"></div>';}).join('')+'</div>'
      +'<div class="mock-stripe" style="background:linear-gradient(90deg,'+cols.join(',')+')"></div>'
      +'</div>'

      // Body
      +'<div class="ibody">'
      +'<div class="inum">IDEA '+(i+1)+'</div>'
      +'<div class="ititle">'+esc(idea.title||'')+'</div>'
      +'<div class="idesc">'+esc(idea.description||'')+'</div>'

      // Swatches
      +'<div class="swatches">'+cols.map(function(c,ci){
        return '<div class="sw" style="background:'+esc(c)+'" onclick="copyTxt(\''+esc(c)+'\')" title="'+(idea.cnames||[])[ci]+' — クリックでコピー"><span class="sw-hex">'+esc(c)+'</span></div>';
      }).join('')+'</div>'

      // Tags
      +'<div class="tags">'
      +'<span class="tag tf">🔤 '+esc(idea.font||'')+'</span>'
      +'<span class="tag tl">📐 '+esc(idea.layout||'')+'</span>'
      +'<span class="tag tm">✨ '+esc(idea.mood||'')+'</span>'
      +'</div>'

      // Illustrator steps
      +'<div class="ai-sec">'
      +'<div class="ai-label">Illustratorでの作り方</div>'
      +'<div class="ai-steps">'
      +(idea.ai_steps||[]).map(function(s,si){
        return '<div class="ai-step"><span class="ai-step-num">'+(si+1)+'.</span><span>'+esc(s)+'</span></div>';
      }).join('')
      +'</div></div>'

      // Reference links
      +'<div class="refs">'
      +'<div class="refs-label">参考画像を探す</div>'
      +'<div class="ref-list">'
      +'<a class="ref-a" href="https://www.pinterest.jp/search/pins/?q='+pq+'" target="_blank" rel="noopener">'
      +'<span class="ref-ico">📌</span>'
      +'<div class="ref-info"><div class="ref-site">Pinterest</div><div class="ref-kw">'+esc(idea.pinterest_kw||'')+'</div></div>'
      +'<span class="ref-arr">↗</span></a>'

      +'<a class="ref-a" href="https://www.behance.net/search/projects/?search='+bq+'" target="_blank" rel="noopener">'
      +'<span class="ref-ico">🎨</span>'
      +'<div class="ref-info"><div class="ref-site">Behance</div><div class="ref-kw">'+esc(idea.behance_kw||'')+'</div></div>'
      +'<span class="ref-arr">↗</span></a>'

      +'<a class="ref-a" href="https://www.google.com/search?q='+gq+'&tbm=isch" target="_blank" rel="noopener">'
      +'<span class="ref-ico">🔍</span>'
      +'<div class="ref-info"><div class="ref-site">Google画像</div><div class="ref-kw">'+esc(idea.google_kw||'')+'</div></div>'
      +'<span class="ref-arr">↗</span></a>'
      +'</div></div>'
      +'</div>';

    grid.appendChild(card);
  });

  out.appendChild(grid);

  var cw=document.createElement('div');
  cw.className='copy-wrap fu';cw.style.animationDelay='.35s';
  cw.innerHTML='<button class="copy-btn" onclick="copyAll()">📋 ブリーフ全体をコピー（Slack・Notion用）</button>';
  out.appendChild(cw);
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg||'コピーしました！';
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},1800);
}

function copyTxt(t){
  navigator.clipboard.writeText(t).then(function(){showToast(t+' をコピー！');});
}

function copyAll(){
  if(!D)return;
  var project=document.getElementById('project').value;
  var txt='【デザインブリーフ】\n';
  txt+='案件：'+project+'\n';
  txt+='媒体：'+document.getElementById('media').value+'\n';
  txt+='トーン：'+document.getElementById('tone').value+'\n\n';
  (D.ideas||[]).forEach(function(idea,i){
    txt+='━━━━━━━━━━━━\n';
    txt+='【アイデア'+(i+1)+'：'+idea.concept+'】\n';
    txt+=idea.title+'\n\n';
    txt+=idea.description+'\n\n';
    txt+='配色：'+(idea.colors||[]).join(' / ')+'\n';
    txt+='フォント：'+idea.font+'\n';
    txt+='レイアウト：'+idea.layout+'\n\n';
    txt+='Illustratorでの作り方：\n';
    (idea.ai_steps||[]).forEach(function(s,si){txt+=(si+1)+'. '+s+'\n';});
    txt+='\n参考：Pinterest「'+idea.pinterest_kw+'」\n\n';
  });
  navigator.clipboard.writeText(txt).then(function(){showToast('ブリーフをコピーしました！');});
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
