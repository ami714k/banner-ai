<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignBrief AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FDFCF7;
  --yellow:#FFE135;
  --yellow-light:#FFF9C4;
  --yellow-pale:#FFFEF0;
  --black:#111108;
  --gray1:#3D3C30;
  --gray2:#8A8870;
  --gray3:#E8E6D9;
  --gray4:#F2F0E6;
  --white:#FFFFFF;
  --red:#FF3B3B;
  --blue:#1A56FF;
  --green:#00A878;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--black);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--black);
  padding:0 40px;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--white);letter-spacing:-0.3px;}
.logo em{font-style:normal;color:var(--yellow);}
.header-right{display:flex;align-items:center;gap:16px;}
.header-tag{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;}

/* ── HERO ── */
.hero{
  background:var(--black);
  padding:64px 40px 56px;
  position:relative;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;
  right:-80px;top:-80px;
  width:400px;height:400px;
  background:var(--yellow);
  border-radius:50%;
  opacity:.08;
}
.hero-eyebrow{
  font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--yellow);margin-bottom:20px;
}
.hero-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(32px,5vw,60px);
  font-weight:800;
  line-height:1.0;
  letter-spacing:-2px;
  color:var(--white);
  margin-bottom:8px;
}
.hero-title .hl{
  display:inline-block;
  background:var(--yellow);
  color:var(--black);
  padding:0 8px;
  line-height:1.1;
}
.hero-sub{
  font-size:14px;color:rgba(255,255,255,.45);
  margin-top:16px;line-height:1.8;
  max-width:560px;
}

/* ── FORM ── */
.form-section{
  background:var(--white);
  border-bottom:2px solid var(--black);
  padding:28px 40px;
}
.form-grid{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr auto;
  gap:12px;align-items:end;
}
@media(max-width:900px){.form-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:540px){.form-grid{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray2);}
.fg-label .req{color:var(--red);}
.fg input,.fg select{
  background:var(--gray4);
  border:1.5px solid var(--gray3);
  border-radius:6px;
  color:var(--black);
  font-family:'Noto Sans JP',sans-serif;
  font-size:12px;
  padding:9px 12px;
  outline:none;
  transition:all .18s;
  width:100%;
}
.fg input:focus,.fg select:focus{border-color:var(--black);background:var(--white);}
.fg input::placeholder{color:var(--gray2);}
.fg select option{background:var(--white);}

.gbtn{
  background:var(--yellow);
  border:none;border-radius:6px;
  color:var(--black);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;
  padding:0 22px;height:40px;
  cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
  transition:all .15s;
  border:2px solid var(--black);
}
.gbtn:hover{background:var(--black);color:var(--yellow);}
.gbtn:disabled{opacity:.4;cursor:not-allowed;}
.spin{width:12px;height:12px;border:2px solid rgba(0,0,0,.2);border-top-color:var(--black);border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── OUTPUT ── */
.output{padding:40px;}

.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:55vh;
  gap:14px;text-align:center;
}
.empty-ico{font-size:52px;opacity:.2;}
.empty-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--gray2);}
.empty-sub{font-size:12px;color:var(--gray2);line-height:1.9;}
.empty-hint{
  font-size:11px;font-weight:700;
  background:var(--yellow);
  color:var(--black);
  padding:6px 16px;border-radius:4px;
}

/* ── LOADING ── */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:55vh;gap:20px;
}
.loading-bar{
  width:280px;height:4px;
  background:var(--gray3);border-radius:2px;overflow:hidden;
}
.loading-bar-inner{
  height:100%;background:var(--yellow);border-radius:2px;
  animation:loadbar 2s ease-in-out infinite;
}
@keyframes loadbar{0%{width:0%;margin-left:0;}50%{width:60%;margin-left:20%;}100%{width:0%;margin-left:100%;};}
.loading-txt{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--gray1);}
.loading-sub{font-size:11px;color:var(--gray2);}

/* ── IDEAS ── */
.result-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;padding-bottom:16px;
  border-bottom:2px solid var(--black);
}
.result-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.result-meta{font-size:11px;color:var(--gray2);}
.copy-all-btn{
  background:var(--black);border:none;border-radius:5px;
  color:var(--white);font-size:10px;font-weight:700;
  padding:7px 14px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  transition:opacity .15s;
}
.copy-all-btn:hover{opacity:.75;}

.ideas-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
@media(max-width:960px){.ideas-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.ideas-grid{grid-template-columns:1fr;}}

/* ── IDEA CARD ── */
.icard{
  background:var(--white);
  border:2px solid var(--black);
  border-radius:12px;
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:transform .2s,box-shadow .2s;
  animation:cardIn .4s ease forwards;
  opacity:0;
}
.icard:hover{transform:translateY(-4px);box-shadow:6px 6px 0 var(--black);}
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* Color preview */
.card-colors{display:flex;height:6px;}
.card-color{flex:1;}

/* Idea banner mock */
.card-mock{
  height:180px;
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;overflow:hidden;
}
.mock-eyebrow{
  font-size:9px;font-weight:700;
  padding:3px 10px;border-radius:999px;
  margin-bottom:8px;letter-spacing:.8px;
  display:inline-block;
}
.mock-title{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;
  text-align:center;line-height:1.2;
  margin-bottom:5px;
  text-shadow:0 2px 8px rgba(0,0,0,.12);
}
.mock-sub{font-size:10px;text-align:center;opacity:.6;margin-bottom:10px;}
.mock-dots{display:flex;gap:5px;justify-content:center;}
.mock-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.25);}
.mock-deco{position:absolute;font-size:16px;opacity:.15;user-select:none;}

/* Card body */
.card-body{padding:18px;flex:1;display:flex;flex-direction:column;gap:10px;}

.card-num{
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:-2px;
}
.card-title{
  font-family:'Syne',sans-serif;
  font-size:16px;font-weight:800;
  line-height:1.3;color:var(--black);
}
.card-desc{
  font-size:11px;color:var(--gray1);
  line-height:1.85;
  border-left:3px solid var(--yellow);
  padding-left:10px;
  background:var(--yellow-pale);
  padding:8px 10px;
  border-radius:0 6px 6px 0;
}

/* Swatches */
.swatches{display:flex;gap:0;border-radius:6px;overflow:hidden;height:38px;}
.sw{
  flex:1;display:flex;align-items:flex-end;
  justify-content:center;padding-bottom:3px;
  cursor:pointer;transition:flex .18s;
  position:relative;
}
.sw:hover{flex:2.5;}
.sw-hex{
  font-size:8px;font-family:monospace;
  color:rgba(255,255,255,.9);
  text-shadow:0 1px 4px rgba(0,0,0,.6);font-weight:700;
  white-space:nowrap;
}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:9px;font-weight:700;padding:4px 9px;border-radius:4px;}
.tag-font{background:var(--yellow-light);color:var(--black);border:1px solid var(--yellow);}
.tag-layout{background:#EEF2FF;color:#3730A3;border:1px solid #C7D2FE;}
.tag-mood{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;}

/* Illustrator steps */
.ai-steps{
  background:var(--gray4);
  border-radius:8px;padding:12px;
  border:1px solid var(--gray3);
}
.ai-steps-label{
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--gray2);
  margin-bottom:8px;
  display:flex;align-items:center;gap:5px;
}
.ai-badge{
  font-size:9px;font-weight:900;
  background:linear-gradient(135deg,#FF9500,#FF3B00);
  color:white;padding:1px 5px;border-radius:3px;
}
.step-list{display:flex;flex-direction:column;gap:5px;}
.step-item{display:flex;gap:8px;align-items:flex-start;}
.step-n{
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:var(--white);
  flex-shrink:0;margin-top:2px;
}
.step-txt{font-size:10px;color:var(--gray1);line-height:1.65;}

/* Refs */
.refs{border-top:1px solid var(--gray3);padding-top:10px;margin-top:auto;}
.refs-label{
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--gray2);margin-bottom:7px;
}
.ref-list{display:flex;flex-direction:column;gap:4px;}
.ref-a{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;
  background:var(--gray4);
  border:1px solid var(--gray3);
  border-radius:6px;
  text-decoration:none;
  transition:all .15s;
}
.ref-a:hover{border-color:var(--black);background:var(--yellow-light);}
.ref-ico{font-size:13px;flex-shrink:0;}
.ref-info{flex:1;min-width:0;}
.ref-site{font-size:10px;font-weight:700;color:var(--black);}
.ref-kw{font-size:9px;color:var(--gray2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ref-arr{font-size:11px;color:var(--gray2);}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--black);color:var(--white);
  font-size:11px;font-weight:700;
  padding:10px 18px;border-radius:6px;
  border-left:3px solid var(--yellow);
  opacity:0;pointer-events:none;
  transition:all .25s;z-index:999;
  transform:translateY(8px);
}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="header">
  <div class="logo">Design<em>Brief</em> AI</div>
  <div class="header-right">
    <div class="header-tag">South Agency · 2026</div>
  </div>
</div>

<div class="hero">
  <div class="hero-eyebrow">✦ AI-powered Design Direction Tool</div>
  <div class="hero-title">
    アイデアに詰まったら、<br>
    <span class="hl">ここから始める。</span>
  </div>
  <div class="hero-sub">
    案件情報を入れるだけで、AIが具体的なデザインアイデア・配色・ワイヤーフレーム・参考リンクを瞬時に生成。<br>
    「最初の一歩」に悩む時間をゼロにする。
  </div>
</div>

<div class="form-section">
  <div class="form-grid">
    <div class="fg">
      <div class="fg-label">案件名・制作物 <span class="req">*</span></div>
      <input type="text" id="project" placeholder="例：夏の新作コスメ紹介バナー、マリノスのイベント告知">
    </div>
    <div class="fg">
      <div class="fg-label">ターゲット層</div>
      <input type="text" id="target" placeholder="例：20代女性">
    </div>
    <div class="fg">
      <div class="fg-label">媒体</div>
      <select id="media">
        <option value="Instagram正方形 1080×1080px">Instagram正方形</option>
        <option value="Instagramストーリー 1080×1920px">ストーリー縦</option>
        <option value="OGP横長 1200×628px">OGP横長</option>
        <option value="Webバナー 728×90px">Web横長バナー</option>
        <option value="LPヘッダー 1920×600px">LPヘッダー</option>
      </select>
    </div>
    <div class="fg">
      <div class="fg-label">トーン</div>
      <select id="tone">
        <option>かわいい・ポップ</option>
        <option>おしゃれ・高級感</option>
        <option>クール・スタイリッシュ</option>
        <option>ナチュラル・やわらか</option>
        <option>信頼感・誠実</option>
        <option>インパクト重視</option>
        <option>シンプル・ミニマル</option>
      </select>
    </div>
    <button class="gbtn" id="gbtn">
      <span id="bt">生成 →</span>
      <div class="spin" id="sp"></div>
    </button>
  </div>
</div>

<div class="output" id="output">
  <div class="empty">
    <div class="empty-ico">✏️</div>
    <div class="empty-title">案件情報を入力してください</div>
    <div class="empty-sub">
      上のフォームに案件情報を入力して「生成」を押すと<br>
      デザインアイデア3案が瞬時に生成されます
    </div>
    <div class="empty-hint">✦ アイデア + 配色 + ワイヤーフレーム + 参考リンクを同時生成</div>
  </div>
</div>

<script>
var D = null;

function getKey(){
  if(window.CK) return window.CK;
  var k = localStorage.getItem('ck');
  if(k){ window.CK = k; return k; }
  k = window.prompt('Claude APIキー（sk-ant-...）を入力\n※次回から不要です');
  if(k){ window.CK = k; localStorage.setItem('ck', k); }
  return k || '';
}

document.getElementById('gbtn').addEventListener('click', generate);

async function generate(){
  var project = document.getElementById('project').value.trim();
  if(!project){ alert('案件名を入力してください'); return; }
  var target = document.getElementById('target').value.trim();
  var media = document.getElementById('media').value;
  var tone = document.getElementById('tone').value;

  document.getElementById('gbtn').disabled = true;
  document.getElementById('bt').style.display = 'none';
  document.getElementById('sp').style.display = 'block';

  document.getElementById('output').innerHTML =
    '<div class="loading">'
    + '<div class="loading-txt">AIがデザインを考えています</div>'
    + '<div class="loading-bar"><div class="loading-bar-inner"></div></div>'
    + '<div class="loading-sub">配色・レイアウト・参考キーワードを生成中...</div>'
    + '</div>';

  var prompt =
    'あなたはLIPS・資生堂・電通の第一線でバナーを数千枚制作してきたトップクリエイティブディレクターです。'
    + '以下の案件のデザインアイデアを3案提案してください。'
    + '案件：' + project + ' ターゲット：' + (target||'未指定') + ' 媒体：' + media + ' トーン：' + tone + ' '
    + '各アイデアで必ず含めること：'
    + '(1)そのターゲットが思わず保存したくなる心理的根拠とトレンド名 '
    + '(2)競合との差別化ポイント '
    + '(3)Illustratorの具体的操作手順（ツール名・数値・色コード・フォント名まで） '
    + '禁止：当たり前の提案・抽象的表現。3案は方向性・配色・レイアウトが全て異なること。'
    + 'JSONのみ出力（説明文・マークダウン不要）。文字列内にダブルクォートを使わないこと。'
    + '{"ideas":['
    + '{"concept":"コンセプト名10文字","title":"方向性20文字",'
    + '"why":"なぜこのターゲットに刺さるか。競合との違い。心理的根拠。ブランド名やトレンドを含めて100文字",'
    + '"colors":["#hex1","#hex2","#hex3","#hex4"],"cnames":["色名1","色名2","色名3","色名4"],'
    + '"bg_from":"#hex","bg_to":"#hex","accent":"#hex","text_color":"#hex",'
    + '"font":"フォント名と使い方20文字","layout_name":"レイアウト名10文字","layout_type":"center_title_grid","mood":"8文字",'
    + '"ai_steps":["手順1：具体的に","手順2：具体的に","手順3：具体的に"],'
    + '"pinterest_kw":"日本語6文字","behance_kw":"英語3単語","google_kw":"日本語8文字"},'
    + '{"concept":"...","title":"...","why":"100文字","colors":["#h1","#h2","#h3","#h4"],"cnames":["n1","n2","n3","n4"],"bg_from":"#hex","bg_to":"#hex","accent":"#hex","text_color":"#hex","font":"...","layout_name":"...","layout_type":"left_text_right_image","mood":"...","ai_steps":["手順1","手順2","手順3"],"pinterest_kw":"...","behance_kw":"...","google_kw":"..."},'
    + '{"concept":"...","title":"...","why":"100文字","colors":["#h1","#h2","#h3","#h4"],"cnames":["n1","n2","n3","n4"],"bg_from":"#hex","bg_to":"#hex","accent":"#hex","text_color":"#hex","font":"...","layout_name":"...","layout_type":"diagonal","mood":"...","ai_steps":["手順1","手順2","手順3"],"pinterest_kw":"...","behance_kw":"...","google_kw":"..."}]}';

  try{
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    var d = await res.json();
    if(d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    var text = (d.content && d.content[0] && d.content[0].text) || '';
    var m = text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('JSONが見つかりません');
    // JSONを安全にパース（制御文字・改行を除去）
    var jsonStr = m[0]
      .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
      .replace(/\n/g, ' ')
      .replace(/\r/g, '')
      .replace(/\t/g, ' ');
    D = JSON.parse(jsonStr);
    render(project, target, media, tone);
  } catch(e) {
    console.error(e);
    document.getElementById('output').innerHTML =
      '<div class="empty"><div class="empty-ico">⚠️</div>'
      + '<div class="empty-title">エラーが発生しました</div>'
      + '<div class="empty-sub">' + esc(e.message) + '</div></div>';
  } finally {
    document.getElementById('gbtn').disabled = false;
    document.getElementById('bt').style.display = 'block';
    document.getElementById('sp').style.display = 'none';
  }
}

function render(project, target, media, tone){
  var out = document.getElementById('output');
  out.innerHTML = '';

  var rh = document.createElement('div');
  rh.className = 'result-header';
  rh.innerHTML =
    '<div>'
    + '<div class="result-title">デザインアイデア 3案 — ' + esc(project) + '</div>'
    + '<div class="result-meta">' + esc(media) + ' · ' + esc(tone) + (target ? ' · ' + esc(target) : '') + '</div>'
    + '</div>'
    + '<button class="copy-all-btn" onclick="copyAll()">📋 ブリーフ全コピー</button>';
  out.appendChild(rh);

  var grid = document.createElement('div');
  grid.className = 'ideas-grid';

  (D.ideas || []).forEach(function(idea, i){
    var acc = idea.accent || '#FFE135';
    var txc = idea.text_color || '#111108';
    var bgF = idea.bg_from || '#FFFEF0';
    var bgT = idea.bg_to || '#FFF9C4';
    var cols = idea.colors || ['#FFE135','#111108','#FF3B3B','#00A878'];
    var pq = encodeURIComponent(idea.pinterest_kw || project);
    var bq = encodeURIComponent(idea.behance_kw || 'banner design');
    var gq = encodeURIComponent(idea.google_kw || project);

    var card = document.createElement('div');
    card.className = 'icard';
    card.style.animationDelay = (i * 0.12) + 's';

    card.innerHTML =
      // 上部カラーバー
      '<div class="card-colors">'
      + cols.map(function(c){ return '<div class="card-color" style="background:' + esc(c) + '"></div>'; }).join('')
      + '</div>'

      // バナーモック
      + '<div class="card-mock" style="background:linear-gradient(135deg,' + esc(bgF) + ',' + esc(bgT) + ')">'
      + '<span class="mock-deco" style="top:8%;left:5%">✿</span>'
      + '<span class="mock-deco" style="top:5%;right:7%">★</span>'
      + '<span class="mock-deco" style="bottom:15%;left:4%">♡</span>'
      + '<span class="mock-deco" style="bottom:12%;right:5%">✦</span>'
      + '<div class="mock-eyebrow" style="background:' + esc(acc) + ';color:' + esc(txc) + '">' + esc(idea.concept || '') + '</div>'
      + '<div class="mock-title" style="color:' + esc(txc) + '">' + esc((project).slice(0, 14)) + '</div>'
      + '<div class="mock-sub" style="color:' + esc(txc) + '">' + esc(target || idea.mood || '') + '</div>'
      + '<div class="mock-dots">' + cols.map(function(c){ return '<div class="mock-dot" style="background:' + esc(c) + '"></div>'; }).join('') + '</div>'
      + '</div>'

      // ボディ
      + '<div class="card-body">'
      + '<div class="card-num" style="color:' + esc(acc === '#FFE135' ? '#B8960C' : acc) + '">IDEA ' + (i+1) + '</div>'
      + '<div class="card-title">' + esc(idea.title || '') + '</div>'
      + '<div class="card-desc">' + esc(idea.why || '') + '</div>'

      // スウォッチ
      + '<div>'
      + '<div class="swatches">'
      + cols.map(function(c, ci){
          return '<div class="sw" style="background:' + esc(c) + '" onclick="copyTxt(\'' + esc(c) + '\')" title="' + esc((idea.cnames || [])[ci] || '') + ' — クリックでコピー">'
            + '<span class="sw-hex">' + esc(c) + '</span></div>';
        }).join('')
      + '</div>'
      + '</div>'

      // タグ
      + '<div class="tags">'
      + '<span class="tag tag-font">🔤 ' + esc(idea.font || '') + '</span>'
      + '<span class="tag tag-layout">📐 ' + esc(idea.layout_name || '') + '</span>'
      + '<span class="tag tag-mood">✨ ' + esc(idea.mood || '') + '</span>'
      + '</div>'

      // Illustrator手順
      + '<div class="ai-steps">'
      + '<div class="ai-steps-label"><span class="ai-badge">Ai</span> Illustratorでの作り方</div>'
      + '<div class="step-list">'
      + (idea.ai_steps || []).map(function(s, si){
          return '<div class="step-item">'
            + '<div class="step-n" style="background:' + esc(acc === '#FFE135' ? '#B8960C' : acc) + '">' + (si+1) + '</div>'
            + '<div class="step-txt">' + esc(s) + '</div>'
            + '</div>';
        }).join('')
      + '</div></div>'

      // 参考リンク
      + '<div class="refs">'
      + '<div class="refs-label">参考画像を探す</div>'
      + '<div class="ref-list">'
      + '<a class="ref-a" href="https://jp.pinterest.com/search/pins/?q=' + pq + '" target="_blank" rel="noopener">'
      + '<span class="ref-ico">📌</span><div class="ref-info"><div class="ref-site">Pinterest</div><div class="ref-kw">' + esc(idea.pinterest_kw || '') + '</div></div><span class="ref-arr">↗</span></a>'
      + '<a class="ref-a" href="https://www.behance.net/search/projects/?search=' + bq + '" target="_blank" rel="noopener">'
      + '<span class="ref-ico">🎨</span><div class="ref-info"><div class="ref-site">Behance</div><div class="ref-kw">' + esc(idea.behance_kw || '') + '</div></div><span class="ref-arr">↗</span></a>'
      + '<a class="ref-a" href="https://www.google.com/search?q=' + gq + '&tbm=isch" target="_blank" rel="noopener">'
      + '<span class="ref-ico">🔍</span><div class="ref-info"><div class="ref-site">Google画像</div><div class="ref-kw">' + esc(idea.google_kw || '') + '</div></div><span class="ref-arr">↗</span></a>'
      + '</div></div>'
      + '</div>';

    grid.appendChild(card);
  });

  out.appendChild(grid);
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function copyTxt(t){
  navigator.clipboard.writeText(t).then(function(){ showToast(t + ' をコピー！'); });
}

function copyAll(){
  if(!D) return;
  var project = document.getElementById('project').value;
  var txt = '【DesignBrief AI — デザインブリーフ】\n';
  txt += '案件：' + project + '\n';
  txt += '媒体：' + document.getElementById('media').value + '\n';
  txt += 'トーン：' + document.getElementById('tone').value + '\n\n';
  (D.ideas || []).forEach(function(idea, i){
    txt += '━━━━━━━━━━━━━━━━\n';
    txt += '【IDEA ' + (i+1) + '：' + idea.concept + '】\n';
    txt += idea.title + '\n\n';
    txt += '▶ なぜこのデザインか\n' + idea.why + '\n\n';
    txt += '▶ 配色\n' + (idea.colors || []).join(' / ') + '\n';
    txt += '▶ フォント：' + idea.font + '\n';
    txt += '▶ レイアウト：' + idea.layout_name + '\n\n';
    txt += '▶ Illustratorでの作り方\n';
    (idea.ai_steps || []).forEach(function(s){ txt += s + '\n'; });
    txt += '\n▶ 参考：Pinterest「' + idea.pinterest_kw + '」\n\n';
  });
  navigator.clipboard.writeText(txt).then(function(){ showToast('ブリーフをコピーしました！'); });
}

function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</html>
